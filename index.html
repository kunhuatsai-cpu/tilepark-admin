<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Park Admin System - Inventory & Lot Control</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
        
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .error-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
          10%, 90% { transform: translate3d(-1px, 0, 0); }
          20%, 80% { transform: translate3d(2px, 0, 0); }
          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
          40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // 🛑 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyKP7YGKdSFYYJMEI2tH7t3u3lILjfc3XGK-xlFx0o3se2_QnnvP-vNtEGcgZXt1Xx7/exec";

        // --- 🛠️ 內建圖示 ---
        const Icon = ({ path, size = 18, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {path}
          </svg>
        );

        const Icons = {
          Search: (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />,
          RefreshCw: (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />,
          Package: (p) => <Icon {...p} path={<><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></>} />,
          Clock: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
          X: (p) => <Icon {...p} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
          CheckCircle: (p) => <Icon {...p} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
          Truck: (p) => <Icon {...p} path={<><rect x="1" y="3" width="15" height="13" rx="2" ry="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>} />,
          Loader: (p) => <Icon {...p} path={<><path d="M21 12a9 9 0 1 1-6.219-8.56" /></>} />,
          Save: (p) => <Icon {...p} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />,
          Database: (p) => <Icon {...p} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />,
          Hash: (p) => <Icon {...p} path={<><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>} />,
          Info: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />,
          Archive: (p) => <Icon {...p} path={<><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></>} />,
          Trash2: (p) => <Icon {...p} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
          FileText: (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>} />
        };

        // --- Helper ---
        const safeString = (val) => String(val || '').trim();
        const parseQty = (val) => {
          const cleaned = safeString(val).replace(/[^\d.]/g, '');
          const num = parseFloat(cleaned);
          return isNaN(num) ? 0 : num;
        };
        
        // 核心邏輯：將字串清理以便比對 (去除所有符號空白)
        const cleanForFuzzyMatch = (val) => {
          return safeString(val)
            .toLowerCase()
            .replace(/[^a-z0-9]/g, ''); 
        };

        // --- 子組件 ---
        const StatusBadge = ({ status }) => {
          let colorClass = "bg-green-100 text-green-800 border-green-200";
          if (status === '已確認庫存') colorClass = "bg-teal-100 text-teal-800 border-teal-200";
          if (status === '已排單出貨') colorClass = "bg-blue-100 text-blue-800 border-blue-200";

          return (
            <span className={`px-2 py-1 rounded-full text-[10px] md:text-xs font-bold border ${colorClass} whitespace-nowrap font-sans`}>
              {status || '已接收'}
            </span>
          );
        };

        const ReservationBadge = () => (
            <span className="flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-200 ml-2 whitespace-nowrap font-sans font-bold">
              <Icons.Archive size={10} /> 保留庫存
            </span>
        );

        // --- 核心組件：訂單詳情 ---
        const OrderDetailModal = ({ order, inventory, onClose, onUpdateStatus, onUpdateDetails, onDelete, isProcessing }) => {
          if (!order) return null;

          const [internalNote, setInternalNote] = useState(order.internalNote || '');
          const [factoryEta, setFactoryEta] = useState(order.factoryEta || '');
          const [deliveryDate, setDeliveryDate] = useState(order.deliveryDate ? order.deliveryDate.split('T')[0] : '');
          const [isSavingDetails, setIsSavingDetails] = useState(false);
          const [saveSuccess, setSaveSuccess] = useState(false);
          
          // 解析訂單商品
          const [editableItems, setEditableItems] = useState(() => {
              const items = Array.isArray(order.parsedItems) ? order.parsedItems : [];
              return items.map(itemStr => {
                  let s = safeString(itemStr);
                  s = s.replace(/^(\d+[\.\s]+)/, ''); // 移除序號
                  
                  const regex = /^(.*?)\s*[xX\*\u00d7]\s*([\d\.]+)\s*([^\(\s]*)(?:\s*\((.*)\))?$/;
                  const match = s.match(regex);
                  
                  if (match) {
                      return { 
                        name: match[1].trim(), 
                        originalQty: match[2].trim(), 
                        currentQty: match[2].trim(),  
                        unit: match[3] || '',
                        note: match[4] || '' 
                      };
                  }
                  return { name: s, originalQty: '1', currentQty: '1', unit: '', note: '' };
              });
          });

          const isStockConfirmed = order.status === '已確認庫存' || order.status === '已排單出貨';
          const isShipped = order.status === '已排單出貨';
          const isReservation = !!order.isReservation;

          /**
           * 核心改進：強化 A06REPORT 分頁比對邏輯
           */
          const getProductMatches = (orderItemName) => {
              try {
                if (!Array.isArray(inventory) || inventory.length === 0) return [];
                
                const targetFull = safeString(orderItemName).toLowerCase();
                const targetCleaned = cleanForFuzzyMatch(orderItemName); 
                
                const matchedLots = inventory.filter(inv => {
                  const qty = parseQty(inv.qty);
                  if (qty <= 0) return false; 
                  
                  const rawID = safeString(inv.id).toLowerCase();      // 貨號 A
                  const rawName = safeString(inv.name).toLowerCase();  // 品名 C
                  
                  const cleanInvID = cleanForFuzzyMatch(inv.id);    
                  const cleanInvName = cleanForFuzzyMatch(inv.name); 
                  
                  // 比對策略：
                  // 1. 貨號完全相同 (例如: AO-2)
                  // 2. 訂單包含貨號 (例如: "AO-2 Aqua" 包含 "AO-2")
                  // 3. 貨號包含訂單內容 (當訂單只有打簡寫時)
                  // 4. 去除符號後的模糊比對
                  const idMatch = rawID && (targetFull.includes(rawID) || rawID.includes(targetFull));
                  const fuzzyIdMatch = cleanInvID && (targetCleaned.includes(cleanInvID) || cleanInvID.includes(targetCleaned));
                  const nameMatch = rawName && (targetFull.includes(rawName) || rawName.includes(targetFull));
                  
                  return idMatch || fuzzyIdMatch || nameMatch;
                });

                // 按「貨號 + 品名」分組
                const groups = matchedLots.reduce((acc, curr) => {
                  const key = `${curr.id}-${curr.name}`;
                  if (!acc[key]) {
                    acc[key] = { id: curr.id, name: curr.name, spec: curr.spec, total: 0, lots: [] };
                  }
                  acc[key].total += parseQty(curr.qty);
                  acc[key].lots.push(curr);
                  return acc;
                }, {});

                return Object.values(groups);
              } catch (e) {
                console.error("Match Logic Error:", e);
                return [];
              }
          };

          const handleUpdateItemQty = (index, value) => {
              const updated = [...editableItems];
              updated[index].currentQty = value;
              setEditableItems(updated);
          };

          const handleSaveDetails = async () => {
              setIsSavingDetails(true);
              setSaveSuccess(false);
              try {
                const itemsString = editableItems.map(i => `${i.name} x ${i.currentQty}${i.unit} ${i.note ? `(${i.note})` : ''}`).join('\n');
                const success = await onUpdateDetails(order.orderId, { 
                    internalNote, factoryEta, deliveryDate, items: itemsString 
                });
                if (success) {
                    setSaveSuccess(true);
                    setTimeout(() => setSaveSuccess(false), 3000);
                }
              } catch (e) {
                console.error("Save Error:", e);
              } finally {
                setIsSavingDetails(false);
              }
          };

          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in font-sans text-gray-800">
              <div className="bg-white w-full max-w-5xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
                <div className={`${isReservation ? 'bg-blue-600' : 'bg-[#222]'} text-white p-4 flex justify-between items-center shrink-0`}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                        <p className="text-xs text-white/70 font-mono tracking-widest uppercase text-[10px]">Tile Park Warehouse Portal</p>
                        {isReservation && <span className="bg-white/20 px-2 py-0.5 rounded text-[10px] font-bold font-sans">保留庫存模式</span>}
                    </div>
                    <h2 className="text-xl font-bold font-mono truncate">單號 #{order.orderId}</h2>
                  </div>
                  <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-colors"><Icons.X size={24} /></button>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar bg-gray-50/50 flex-1">
                  
                  {/* 分頁與數據指示器 */}
                  <div className="mb-4 p-3 bg-white border border-gray-200 rounded-xl shadow-sm flex items-center justify-between text-[11px] font-bold">
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2">
                            <div className={`w-2.5 h-2.5 rounded-full ${inventory.length > 0 ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500 animate-pulse'}`}></div>
                            <span className="text-gray-500">數據分頁: <span className="text-gray-800">A06REPORT</span></span>
                            <span className="text-gray-500 ml-2">庫存總數: <span className="text-gray-800 font-mono">{inventory.length} 筆資料</span></span>
                        </div>
                    </div>
                    <span className="text-gray-400 italic">貨號比對已啟動模糊優先機制...</span>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-xl p-5 mb-6 shadow-sm flex flex-col sm:flex-row gap-6">
                        <label className={`flex-1 flex items-center gap-4 cursor-pointer select-none transition-all ${isProcessing ? 'opacity-50' : ''}`}>
                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isStockConfirmed ? 'bg-teal-500 border-teal-500 shadow-lg shadow-teal-100' : 'bg-white border-gray-200 shadow-sm'}`}>
                                {isStockConfirmed ? <Icons.CheckCircle size={28} className="text-white" /> : <Icons.Database size={24} className="text-gray-300" />}
                            </div>
                            <div>
                                <span className={`block font-bold text-base ${isStockConfirmed ? 'text-teal-700' : 'text-gray-700'}`}>已確認批號與庫存</span>
                                <span className="text-xs text-gray-400 font-medium font-sans">確認現貨批號無誤</span>
                            </div>
                            <input type="checkbox" className="hidden" checked={isStockConfirmed} onChange={() => !isStockConfirmed && onUpdateStatus([order.orderId], '已確認庫存')} disabled={isProcessing || isStockConfirmed} />
                        </label>
                        <div className="hidden sm:block w-px bg-gray-100 h-14 self-center"></div>
                        <label className={`flex-1 flex items-center gap-4 cursor-pointer select-none transition-all ${isProcessing ? 'opacity-50' : ''}`}>
                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isShipped ? 'bg-blue-500 border-blue-500 shadow-lg shadow-blue-100' : 'bg-white border-gray-200 shadow-sm'}`}>
                                {isShipped ? <Icons.Truck size={28} className="text-white" /> : <Icons.Package size={24} className="text-gray-300" />}
                            </div>
                            <div>
                                <span className={`block font-bold text-base ${isShipped ? 'text-blue-700' : 'text-gray-700'}`}>已排單出貨</span>
                                <span className="text-xs text-gray-400 font-medium font-sans">物流配送已安排</span>
                            </div>
                            <input type="checkbox" className="hidden" checked={isShipped} onChange={() => !isShipped && onUpdateStatus([order.orderId], '已排單出貨')} disabled={isProcessing || isShipped} />
                        </label>
                  </div>

                  <section className="mb-8">
                    <h3 className={`text-xs font-black uppercase tracking-widest mb-4 flex items-center justify-between ${isReservation ? 'text-blue-600' : 'text-[#c25e00]'}`}>
                        <span>訂單明細與即時批號對照 (自動過濾 0 庫存)</span>
                    </h3>
                    
                    <div className="space-y-6 text-gray-800 font-sans">
                      {editableItems.map((item, idx) => {
                          const matches = getProductMatches(item.name);
                          const orderQty = parseQty(item.currentQty);
                          
                          return (
                            <div key={idx} className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm font-sans">
                                <div className="p-4 bg-gray-50 border-b flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 font-sans">
                                    <div className="flex-1 min-w-0 font-sans">
                                        <div className="text-[15px] font-black text-gray-900 mb-1 break-words leading-tight font-sans">{item.name}</div>
                                        <div className="flex items-center gap-2 text-[10px] text-gray-500 font-medium font-mono font-sans">
                                            <Icons.Info size={12}/> 訂單文字: {order.parsedItems[idx] || item.name}
                                        </div>
                                    </div>
                                    
                                    {/* 數量對照與調整區 */}
                                    <div className="flex items-center gap-6 bg-white p-2 rounded-lg border border-gray-200 shadow-inner font-sans">
                                        <div className="flex flex-col items-center px-4 border-r border-gray-100 font-sans">
                                            <span className="text-[9px] font-bold text-gray-400 uppercase mb-0.5 font-sans">客戶原始數量</span>
                                            <span className="font-mono text-base font-black text-gray-800 font-sans">{item.originalQty} <span className="text-[10px] font-normal">{item.unit}</span></span>
                                        </div>
                                        <div className="flex flex-col items-center px-2 font-sans">
                                            <span className="text-[9px] font-bold text-[#c25e00] uppercase mb-0.5 font-sans">備用調整數量</span>
                                            <div className="flex items-center gap-1.5 font-sans">
                                                <input 
                                                    type="number" 
                                                    value={item.currentQty} 
                                                    onChange={(e) => handleUpdateItemQty(idx, e.target.value)}
                                                    className="w-20 p-1 border border-orange-300 rounded text-base font-black text-center outline-none bg-orange-50 focus:ring-2 focus:ring-orange-200 text-orange-700 font-sans"
                                                />
                                                <span className="text-[11px] font-bold text-gray-500 font-sans">{item.unit}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-4 font-sans">
                                    {matches.length > 0 ? (
                                        <div className="grid grid-cols-1 gap-4 font-sans">
                                            {matches.map((group, gIdx) => (
                                                <div key={gIdx} className="border border-teal-100 bg-teal-50/5 rounded-lg p-3 font-sans">
                                                    <div className="flex justify-between items-center mb-3 pb-2 border-b border-teal-100 font-sans">
                                                        <div className="flex flex-col font-sans">
                                                            <div className="flex items-center gap-2 mb-1 font-sans">
                                                                <span className="font-mono text-[11px] font-black bg-teal-600 text-white px-1.5 py-0.5 rounded shrink-0 font-sans">{group.id}</span>
                                                                <span className="text-[13px] font-bold text-gray-700 truncate font-sans">{group.name}</span>
                                                            </div>
                                                            <div className="text-[10px] text-gray-400 font-medium font-sans">規格: {group.spec || '標準'}</div>
                                                        </div>
                                                        <div className="text-right font-sans">
                                                            <span className="text-[10px] text-gray-400 block uppercase font-bold tracking-tighter font-sans">A06REPORT 總剩餘</span>
                                                            <span className={`text-xl font-black ${group.total < orderQty ? 'text-red-500 underline decoration-2' : 'text-teal-600'} font-sans`}>{group.total}</span>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* 批號明細 */}
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 font-sans">
                                                        {group.lots.map((lot, lIdx) => (
                                                            <div key={lIdx} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col hover:border-teal-400 transition-colors group font-sans">
                                                                <span className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1 font-sans">BATCH / 批號</span>
                                                                <span className="font-mono text-[13px] font-black text-gray-700 break-all leading-tight mb-2 font-sans">
                                                                    {lot.lot && lot.lot !== "" ? lot.lot : "無批號"}
                                                                </span>
                                                                <div className="mt-auto pt-2 border-t border-gray-50 flex justify-between items-end font-sans">
                                                                    <span className="text-[9px] text-gray-400 font-bold uppercase font-sans font-sans font-sans">剩餘</span>
                                                                    <span className="font-black text-[15px] text-teal-600 font-mono leading-none font-sans font-sans">{lot.qty}</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300 font-sans">
                                            <Icons.Search size={44} className="mx-auto text-gray-200 mb-3"/>
                                            <p className="text-sm text-gray-400 font-black uppercase tracking-widest font-sans">Match Failed</p>
                                            <p className="text-[11px] text-gray-400 mt-2 font-sans font-sans">系統無法在 A06REPORT 中找到對應貨號： <span className="font-bold text-gray-600 font-mono font-sans font-sans">"{item.name}"</span></p>
                                            
                                            {inventory.length > 0 && (
                                                <div className="mt-4 p-3 bg-white/50 rounded-lg inline-block text-[10px] text-gray-400 text-left font-sans">
                                                    <strong>提示：系統偵測到的前 5 筆貨號如下，請確認欄位是否正確：</strong><br/>
                                                    {inventory.slice(0, 5).map(i => i.id).join(', ')} ...等
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                          );
                      })}
                    </div>
                  </section>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 font-sans text-gray-800 font-bold">
                    <section className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm font-sans font-bold">
                      <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2 font-sans font-bold font-bold font-bold font-bold">
                        <Icons.Package size={14}/> 客戶基本資訊
                      </h4>
                      <div className="space-y-3 text-sm text-gray-600 font-bold font-bold font-bold">
                        <p className="flex justify-between gap-4 font-sans font-bold font-bold"><span className="text-gray-400 shrink-0 font-sans font-bold">公司名稱:</span> <span className="font-bold text-gray-800 text-right">{order.company}</span></p>
                        <p className="flex justify-between gap-4 font-sans font-bold font-bold"><span className="text-gray-400 shrink-0 font-sans font-bold">聯絡窗口:</span> <span className="font-bold text-gray-800 text-right">{order.contact}</span></p>
                        <p className="flex justify-between gap-4 font-sans font-bold font-bold"><span className="text-gray-400 shrink-0 font-sans font-bold">電話號碼:</span> <a href={`tel:${order.phone}`} className="text-blue-600 font-mono font-bold underline text-right">{order.phone}</a></p>
                      </div>
                    </section>
                    <section className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm font-sans font-bold">
                      <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2 font-sans font-bold font-bold">
                        <Icons.Truck size={14}/> 出貨安排
                      </h4>
                      <div className="space-y-3 text-sm text-gray-600 font-bold font-bold">
                        <div className="flex justify-between items-center gap-4 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold">
                            <span className="text-gray-400 shrink-0 font-sans font-bold font-bold">預計出貨日期:</span> 
                            <input type="date" value={deliveryDate} onChange={e => setDeliveryDate(e.target.value)} className="font-bold border-b border-gray-200 focus:border-orange-500 outline-none bg-transparent py-1 text-right w-full max-w-[150px] text-gray-800 font-sans font-bold font-bold font-bold" />
                        </div>
                        <p className="flex justify-between gap-4 font-sans font-bold font-bold"><span className="text-gray-400 shrink-0 font-bold">收貨地址:</span> <span className="text-right ml-4 break-words text-gray-800 font-semibold">{order.address}</span></p>
                      </div>
                    </section>
                  </div>

                  <div className="bg-amber-50/50 border border-amber-200 rounded-xl p-5 mb-8 font-sans text-gray-800 font-bold font-bold">
                    <h3 className="text-sm font-black text-amber-800 mb-4 flex items-center gap-2 font-sans font-bold font-bold font-bold">內部營運管理備忘錄</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 font-sans font-bold">
                        <div className="relative font-sans font-bold font-bold font-bold">
                            <label className="text-[10px] font-bold text-amber-700 uppercase mb-1.5 block font-sans font-bold">工廠 ETA (預計抵港時間)</label>
                            <input type="date" value={factoryEta} onChange={e => setFactoryEta(e.target.value)} className="w-full p-2.5 border border-amber-200 rounded-lg text-sm bg-white shadow-sm font-sans font-bold" />
                        </div>
                        <div className="md:col-span-2 font-sans text-gray-800 font-bold font-bold">
                            <label className="text-[10px] font-bold text-amber-700 uppercase mb-1.5 block font-sans font-bold">內部備註 (僅管理員可見)</label>
                            <textarea value={internalNote} onChange={e => setInternalNote(e.target.value)} className="w-full p-3 border border-amber-200 rounded-xl text-sm h-24 bg-white shadow-sm resize-none font-sans font-bold" placeholder="請在此記錄關於批號、加工或物流的內部細節..." />
                        </div>
                    </div>
                  </div>

                  <div className="pt-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 font-sans text-gray-800 font-bold font-bold font-bold">
                    <button onClick={() => { if (confirm(`確定刪除訂單 #${order.orderId}？此操作不可復原。`)) { onDelete([order.orderId]); onClose(); } }} className="text-red-400 hover:text-red-600 text-sm font-bold flex items-center gap-1.5 px-4 py-2 hover:bg-red-50 rounded-lg transition-all font-sans font-bold font-bold font-bold font-bold"><Icons.Trash2 size={16}/> 刪除此單據</button>
                    <button onClick={handleSaveDetails} disabled={isSavingDetails} className={`w-full sm:w-auto px-10 py-3.5 rounded-xl text-sm font-black text-white transition-all shadow-lg flex items-center justify-center gap-3 active:scale-95 ${saveSuccess ? 'bg-green-600 shadow-green-100' : 'bg-[#c25e00] hover:bg-[#a04d00] shadow-orange-100'} font-sans font-bold font-bold font-bold`}>
                        {isSavingDetails ? <Icons.Loader size={20} className="animate-spin" /> : saveSuccess ? <Icons.CheckCircle size={20} /> : <Icons.Save size={20} />}
                        {isSavingDetails ? '正在同步...' : saveSuccess ? '變更已成功同步' : '確認變更並儲存數量'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [password, setPassword] = useState("");
          const [orders, setOrders] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [filteredOrders, setFilteredOrders] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedIds, setSelectedIds] = useState(new Set()); 
          const [loading, setLoading] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [lastUpdated, setLastUpdated] = useState("");
          const [filterStatus, setFilterStatus] = useState('all');
          const [apiError, setApiError] = useState(null);

          const fetchWithRetry = async (url, retries = 3) => {
            try {
              const res = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache',
                redirect: 'follow'
              });
              
              if (!res.ok) throw new Error(`HTTP 錯誤: ${res.status}`);
              
              const text = await res.text();
              const data = JSON.parse(text);
              if (data && (data.orders || data.inventory)) return data;
              throw new Error("回傳資料格式不正確");
              
            } catch (e) {
              if (retries > 0) {
                await new Promise(r => setTimeout(r, 2000));
                return fetchWithRetry(url, retries - 1);
              }
              throw e;
            }
          };

          const fetchAllData = useCallback(async () => {
            if (!window.navigator.onLine) {
              setApiError("網路連線失敗。");
              return;
            }

            setLoading(true);
            setApiError(null);
            try {
              const timestamp = Date.now();
              const result = await fetchWithRetry(`${API_URL}?t=${timestamp}`);
              
              const rawOrders = Array.isArray(result.orders) ? result.orders : [];
              const rawInventory = Array.isArray(result.inventory) ? result.inventory : [];
              
              const processedOrders = rawOrders.map(item => ({
                ...item,
                parsedItems: item.items ? String(item.items).split('\n') : [],
                status: safeString(item.status) || '已接收',
                isReservation: String(item.orderType || '').includes('保留庫存')
              }));
              
              setOrders(processedOrders);
              setInventory(rawInventory);
              setLastUpdated(new Date().toLocaleTimeString());
            } catch (error) {
              console.error("Fetch Error:", error);
              setApiError(error.message === 'Failed to fetch' ? 'Google 伺服器通訊異常，請點擊重試按鈕。' : error.message);
            } finally {
              setLoading(false);
            }
          }, []);

          useEffect(() => {
            if (isLoggedIn) fetchAllData();
          }, [isLoggedIn, fetchAllData]);

          useEffect(() => {
            let res = orders;
            if (filterStatus === 'reserved') res = res.filter(o => o.isReservation);
            else if (filterStatus === 'shipped') res = res.filter(o => o.status === '已排單出貨');
            else if (filterStatus === 'normal') res = res.filter(o => !o.isReservation && o.status !== '已排單出貨');

            if (searchTerm) {
              const t = safeString(searchTerm).toLowerCase();
              res = res.filter(o => safeString(o.company).toLowerCase().includes(t) || safeString(o.orderId).toLowerCase().includes(t));
            }
            setFilteredOrders(res);
          }, [searchTerm, orders, filterStatus]);

          const sendCommand = async (p) => {
            setIsProcessing(true);
            try {
                const fd = new URLSearchParams();
                fd.append('payload', JSON.stringify(p));
                await fetch(API_URL, { 
                  method: 'POST', 
                  mode: 'no-cors', 
                  body: fd 
                });
                return true;
            } catch (err) { 
              console.error("POST Error:", err);
              return false; 
            } finally { 
              setIsProcessing(false); 
            }
          };

          const handleUpdateDetails = async (id, details) => {
            const ok = await sendCommand({ action: 'updateDetails', orderId: id, ...details });
            if (ok) {
                setOrders(prev => prev.map(o => o.orderId === id ? { ...o, ...details, parsedItems: details.items ? details.items.split('\n') : o.parsedItems } : o));
                setTimeout(fetchAllData, 1500);
                return true;
            }
            return false;
          };

          const handleStatusUpdate = async (ids, status) => {
            const targetIds = ids || Array.from(selectedIds);
            const ok = await sendCommand({ action: 'updateStatus', status, ids: targetIds });
            if (ok) {
                setOrders(prev => prev.map(o => targetIds.includes(o.orderId) ? { ...o, status } : o));
                setSelectedIds(new Set());
                if (selectedOrder && targetIds.includes(selectedOrder.orderId)) {
                    setSelectedOrder(prev => prev ? ({ ...prev, status }) : null);
                }
                setTimeout(fetchAllData, 1500);
            }
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#111] flex flex-col items-center justify-center p-4 font-sans text-white font-bold">
                <div className="w-full max-w-sm bg-white/5 p-10 rounded-[2rem] backdrop-blur-xl border border-white/10 shadow-2xl animate-fade-in font-sans font-bold">
                  <div className="text-center mb-10 font-sans font-bold">
                    <h1 className="text-3xl font-black tracking-[0.2em] leading-tight font-sans font-bold font-bold font-bold">TILE PARK</h1>
                    <p className="text-[10px] text-orange-500 font-bold tracking-[0.5em] mt-2 text-center uppercase font-sans font-sans font-bold font-bold font-bold">Warehouse Portal</p>
                  </div>
                  <form onSubmit={(e) => { e.preventDefault(); if(password==='8888') setIsLoggedIn(true); }} className="space-y-6 text-gray-800 font-sans font-bold font-bold font-bold">
                    <input type="password" placeholder="••••••••" className="w-full px-6 py-4 bg-black/40 border border-white/10 rounded-2xl text-white text-center tracking-[1em] focus:border-orange-500 outline-none transition-all font-mono font-bold font-bold font-bold" value={password} onChange={e=>setPassword(e.target.value)} autoFocus />
                    <button type="submit" className="w-full bg-[#c25e00] text-white py-4 rounded-2xl font-black tracking-widest hover:bg-orange-600 transition-all shadow-lg active:scale-95 uppercase font-sans font-bold font-bold font-bold">LOGIN</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="h-screen w-full bg-gray-100 font-sans flex flex-col md:flex-row overflow-hidden text-gray-800 font-bold">
              <aside className="bg-[#1a1a1a] text-white flex-shrink-0 md:w-64 flex flex-col font-sans font-bold">
                <div className="p-6 border-b border-white/5 font-sans font-bold">
                  <div className="font-black text-xl tracking-tighter font-sans font-bold">TILE PARK</div>
                  <div className="text-[10px] text-orange-500 font-mono font-bold uppercase tracking-widest font-sans font-bold font-bold">Admin Control</div>
                </div>
                <nav className="p-4 flex-1 font-sans font-bold font-bold font-bold">
                  <button className="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-[#c25e00] text-white font-bold text-sm shadow-lg shadow-orange-900/40 font-sans font-bold font-bold">
                    <Icons.FileText size={18} /> 訂單管理系統
                  </button>
                </nav>
                <div className="p-4 border-t border-white/5 text-[10px] text-gray-500 font-mono text-center tracking-tighter uppercase font-bold font-sans font-bold">Sync: {lastUpdated}</div>
              </aside>

              <main className="flex-1 flex flex-col min-h-0 relative">
                <header className="bg-white border-b p-5 flex flex-col gap-4 shadow-sm z-10 font-sans text-gray-800 font-bold font-bold">
                  <div className="flex flex-col sm:flex-row justify-between items-center gap-4 font-sans font-bold font-bold font-bold">
                      <h2 className="text-xl font-black text-gray-800 tracking-tight font-sans font-bold font-bold font-bold">訂單庫存對照後台</h2>
                      <div className="flex w-full sm:w-auto gap-2 font-sans font-bold font-bold font-bold">
                        <div className="relative flex-1 sm:w-80 font-sans font-bold">
                          <Icons.Search className="absolute left-3 top-3 text-gray-400 font-sans font-bold" size={16} />
                          <input type="text" placeholder="搜尋客戶名稱或單號..." className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-orange-500 transition-all font-medium text-gray-800 font-sans font-bold font-bold font-bold" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                        </div>
                        <button onClick={fetchAllData} className={`p-2.5 bg-white border border-gray-200 rounded-xl transition-all active:scale-90 ${loading ? 'animate-spin text-orange-500' : 'text-gray-500 hover:bg-gray-50'} font-sans font-bold`}><Icons.RefreshCw size={20}/></button>
                      </div>
                  </div>
                  <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 font-sans font-bold font-bold font-bold font-bold">
                    {['all', 'normal', 'reserved', 'shipped'].map(s => (
                      <button key={s} onClick={()=>setFilterStatus(s)} className={`px-5 py-2 rounded-full text-xs font-black whitespace-nowrap transition-all border ${filterStatus===s ? 'bg-gray-800 text-white border-gray-800 shadow-md font-sans font-bold' : 'bg-white text-gray-400 border-gray-200 hover:border-gray-300 font-sans font-bold'}`}>
                        {s==='all' && '全部內容'} {s==='normal' && '一般訂單'} {s==='reserved' && '保留單據'} {s==='shipped' && '已出貨'}
                      </button>
                    ))}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar pb-32 font-bold font-bold font-bold font-bold">
                    {apiError && (
                      <div className="mb-6 p-5 bg-red-50 border border-red-200 rounded-2xl text-red-600 text-sm font-bold flex flex-col gap-4 error-shake font-sans font-bold font-bold">
                         <div className="flex items-center gap-2 text-base font-sans font-bold font-bold font-bold font-bold"><Icons.Info size={20}/> 通訊異常: {apiError}</div>
                         <div className="text-xs text-gray-500 font-normal leading-relaxed font-sans font-bold font-bold">
                            <p className="mb-2 font-bold text-gray-600 font-sans font-bold">🛠️ 排除指南：</p>
                            <ul className="list-decimal list-inside space-y-2 font-sans font-bold font-bold font-bold">
                              <li>請確認 Google 試算表的分頁名稱為「<strong>A06REPORT</strong>」。</li>
                              <li>確認貨號 (A欄)、產品名稱 (C欄) 是否包含於訂單品名中。</li>
                              <li>點擊右上角重整按鈕嘗試手動同步數據。</li>
                            </ul>
                         </div>
                         <div className="flex gap-4 font-bold font-bold font-bold font-bold font-bold">
                            <button onClick={fetchAllData} className="px-5 py-2.5 bg-red-600 text-white rounded-lg text-xs font-bold hover:bg-red-700 shadow-sm transition-all active:scale-95 font-sans font-bold font-bold font-bold font-bold">重新嘗試連線</button>
                         </div>
                      </div>
                    )}

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden font-sans font-bold">
                        <div className="overflow-x-auto font-bold font-bold">
                            <table className="w-full text-sm text-left text-gray-700 font-sans font-bold font-bold font-bold">
                                <thead className="bg-gray-50 text-[10px] font-black uppercase text-gray-400 border-b tracking-widest font-sans font-bold font-bold font-bold">
                                    <tr>
                                        <th className="p-4 w-12 text-center font-sans font-bold font-bold font-bold font-bold">
                                            <input type="checkbox" className="rounded" onChange={e => setSelectedIds(e.target.checked ? new Set(filteredOrders.map(o=>o.orderId)) : new Set())} checked={selectedIds.size > 0 && selectedIds.size === filteredOrders.length} />
                                        </th>
                                        <th className="p-4 font-sans font-bold font-bold font-bold font-bold font-bold">訂單單號</th>
                                        <th className="p-4 font-sans text-center font-sans font-bold font-bold font-bold font-bold font-bold">目前狀態</th>
                                        <th className="p-4 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">客戶公司名稱</th>
                                        <th className="p-4 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">預計出貨日</th>
                                        <th className="p-4 text-right pr-6 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">功能</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 font-medium text-gray-700 font-sans font-bold font-bold">
                                    {filteredOrders.length === 0 && !loading ? (
                                      <tr><td colSpan="6" className="p-10 text-center text-gray-400 italic font-sans text-sm font-sans font-bold font-bold font-bold font-bold font-bold">查無資料。</td></tr>
                                    ) : (
                                      filteredOrders.map(o => (
                                        <tr key={o.orderId} className={`hover:bg-orange-50/30 transition-colors cursor-pointer ${selectedIds.has(o.orderId) ? 'bg-orange-50/50' : ''}`} onClick={()=>setSelectedOrder(o)}>
                                            <td className="p-4 text-center font-sans font-bold font-bold font-bold font-bold font-bold font-bold" onClick={e=>e.stopPropagation()}>
                                                <input type="checkbox" className="rounded border-gray-300 text-orange-600 focus:ring-orange-500 font-sans font-sans font-bold font-bold font-bold" checked={selectedIds.has(o.orderId)} onChange={()=>{
                                                    const n = new Set(selectedIds);
                                                    if(n.has(o.orderId)) n.delete(o.orderId); else n.add(o.orderId);
                                                    setSelectedIds(n);
                                                }} />
                                            </td>
                                            <td className="p-4 font-sans font-sans font-bold font-bold font-bold font-bold">
                                                <div className="flex items-center">
                                                    <span className={`font-mono font-black ${o.isReservation ? 'text-blue-600' : 'text-orange-600'}`}>{o.orderId}</span>
                                                    {o.isReservation && <ReservationBadge />}
                                                </div>
                                            </td>
                                            <td className="p-4 text-center font-sans font-bold font-bold"><StatusBadge status={o.status} /></td>
                                            <td className="p-4 font-bold text-gray-800 font-sans font-bold font-bold font-bold font-bold">{o.company}</td>
                                            <td className="p-4 text-gray-500 font-mono text-xs font-sans font-bold font-bold font-bold font-bold">{o.deliveryDate ? o.deliveryDate.split('T')[0] : '未排程'}</td>
                                            <td className="p-4 text-right pr-6 font-sans font-bold font-bold font-bold font-bold font-bold">
                                                <button className="text-[10px] font-black text-gray-400 bg-gray-50 px-3 py-1.5 rounded-full uppercase hover:bg-orange-100 hover:text-orange-600 transition-all border border-gray-200 font-bold font-bold font-bold font-bold">View Detail</button>
                                            </td>
                                        </tr>
                                      ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                {selectedIds.size > 0 && (
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border border-gray-200 shadow-2xl rounded-2xl px-6 py-4 flex items-center gap-6 animate-slide-up z-40 font-sans text-gray-700 font-bold font-bold font-bold font-bold">
                        <span className="text-sm font-black text-gray-600 border-r border-gray-200 pr-6 uppercase tracking-widest whitespace-nowrap font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold">已選 <span className="text-orange-600 font-mono font-bold font-bold font-bold font-bold">{selectedIds.size}</span> 筆</span>
                        <div className="flex gap-3 font-sans font-bold font-bold font-bold font-bold font-bold font-bold">
                            <button onClick={()=>handleStatusUpdate(null, '已確認庫存')} className="flex items-center gap-2 text-xs font-black text-teal-700 bg-teal-50 px-4 py-2 rounded-xl border border-teal-100 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold"><Icons.CheckCircle size={16}/> 確認庫存</button>
                            <button onClick={()=>handleStatusUpdate(null, '已排單出貨')} className="flex items-center gap-2 text-xs font-black text-blue-700 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 font-sans font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold"><Icons.Truck size={16}/> 排單出貨</button>
                        </div>
                    </div>
                )}
              </main>

              {selectedOrder && (
                <OrderDetailModal 
                    order={selectedOrder} 
                    inventory={inventory} 
                    onClose={()=>setSelectedOrder(null)} 
                    onUpdateStatus={handleStatusUpdate} 
                    onUpdateDetails={handleUpdateDetails} 
                    onDelete={ids => handleStatusUpdate(ids, 'delete')} 
                    isProcessing={isProcessing} 
                />
              )}

              <style>{`
                .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
                @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
