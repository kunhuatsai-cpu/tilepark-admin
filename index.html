<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Park Admin System - V14.5 Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // 🔴 Web App 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyKP7YGKdSFYYJMEI2tH7t3u3lILjfc3XGK-xlFx0o3se2_QnnvP-vNtEGcgZXt1Xx7/exec";

        // --- 安全工具集 ---
        const Utils = {
            safeStr: (v) => String(v || '').trim(),
            safeDate: (v) => {
                const s = Utils.safeStr(v);
                return s.includes('T') ? s.split('T')[0] : s;
            },
            parseQty: (v) => {
                const s = Utils.safeStr(v).replace(/,/g, ''); 
                const num = parseFloat(s);
                return isNaN(num) ? 0 : num;
            },
            // V14.5 強力清洗：全形轉半形 -> 轉小寫 -> 移除所有非英數字元
            cleanFuzzy: (v) => {
                return Utils.safeStr(v)
                    .normalize('NFKC') 
                    .toLowerCase()
                    .replace(/[^a-z0-9]/g, ''); 
            },
            formatBatch: (v) => {
                const s = Utils.safeStr(v);
                if (s.toUpperCase().includes('E+')) {
                    const num = parseFloat(s);
                    return isNaN(num) ? s : String(num);
                }
                return s;
            }
        };

        // --- UI Icons ---
        const IconWrap = ({ d, size = 18, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {d}
          </svg>
        );

        const UI = {
          Search: (p) => <IconWrap {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />,
          Refresh: (p) => <IconWrap {...p} d={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />,
          Close: (p) => <IconWrap {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
          Check: (p) => <IconWrap {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
          Truck: (p) => <IconWrap {...p} d={<><rect x="1" y="3" width="15" height="13" rx="2" ry="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>} />,
          Loader: (p) => <IconWrap {...p} d={<><path d="M21 12a9 9 0 1 1-6.219-8.56" /></>} />,
          Save: (p) => <IconWrap {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />,
          DB: (p) => <IconWrap {...p} d={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />,
          Trash: (p) => <IconWrap {...p} d={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
          Info: (p) => <IconWrap {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />,
          File: (p) => <IconWrap {...p} d={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>} />,
          User: (p) => <IconWrap {...p} d={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
          Box: (p) => <IconWrap {...p} d={<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />,
          Filter: (p) => <IconWrap {...p} d={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />,
          Lock: (p) => <IconWrap {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
          Alert: (p) => <IconWrap {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
          Bug: (p) => <IconWrap {...p} d={<><rect width="8" height="14" x="8" y="6" rx="4"/><path d="m19 13-3.25-1.62"/><path d="m5 13 3.25-1.62"/><path d="m19 19-3.5-3.5"/><path d="m5 19 3.5-3.5"/><path d="m19 7-3.5 3.5"/><path d="m5 7 3.5 3.5"/></>} />
        };

        const StatusBadge = ({ status }) => {
          let color = "bg-green-100 text-green-800 border-green-200";
          if (status === '已確認庫存') color = "bg-teal-100 text-teal-800 border-teal-200";
          if (status === '已排單出貨') color = "bg-blue-100 text-blue-800 border-blue-200";
          return <span className={`px-2 py-1 rounded-full text-[10px] font-bold border ${color} whitespace-nowrap`}>{status || '已接收'}</span>;
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-center flex flex-col items-center justify-center h-64 bg-gray-50 rounded-xl border-2 border-dashed border-red-200">
                            <UI.Alert size={40} className="text-red-500 mb-4"/>
                            <h3 className="text-lg font-bold text-gray-800 mb-2">發生顯示錯誤</h3>
                            <p className="text-sm text-gray-500 mb-4">無法載入此區塊，請關閉後重試。</p>
                            <button onClick={this.props.onClose} className="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-black transition-colors">關閉視窗</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const OrderDetailModal = ({ order, inventory, onClose, onUpdateStatus, onUpdateDetails, onDelete, isProcessing }) => {
          if (!order) return null;
          
          const isStockConfirmed = order.status === '已確認庫存' || order.status === '已排單出貨';
          const isShipped = order.status === '已排單出貨';

          const [orderType, setOrderType] = useState(Utils.safeStr(order.orderType));
          const [internalNote, setInternalNote] = useState(Utils.safeStr(order.internalNote));
          const [factoryEta, setFactoryEta] = useState(Utils.safeStr(order.factoryEta));
          const [deliveryDate, setDeliveryDate] = useState(Utils.safeDate(order.deliveryDate));
          const [siteContact, setSiteContact] = useState(Utils.safeStr(order.siteContact)); 
          const [sitePhone, setSitePhone] = useState(Utils.safeStr(order.sitePhone));
          const [address, setAddress] = useState(Utils.safeStr(order.address || order.shippingAddress));

          const [isSavingDetails, setIsSavingDetails] = useState(false);
          const [saveSuccess, setSaveSuccess] = useState(false);
          
          const [editableItems, setEditableItems] = useState(() => {
              try {
                const rawItems = Utils.safeStr(order.items).split('\n').filter(l => l.trim() !== "");
                return rawItems.map(line => {
                    let s = Utils.safeStr(line).replace(/\u3000/g, ' ').replace(/^["']|["']$/g, '').trim();
                    s = s.replace(/^(\d{1,3}[\.\s])\s*/, '');
                    
                    // Regex: 抓取最後的 "x 數量"
                    const match = s.match(/^(.*)[\sxX\*＊\u00d7]+([0-9,\.]+)\s*([^\d\s]*)$/);
                    
                    if (match && match[1] && match[2]) {
                        return { name: match[1].trim(), originalQty: match[2].trim(), currentQty: match[2].trim(), unit: match[3] || '', note: '' };
                    }
                    return { name: s, originalQty: '1', currentQty: '1', unit: '', note: '' };
                });
              } catch (e) {
                console.error(e);
                return [{ name: "解析錯誤 (請手動編輯)", originalQty: '0', currentQty: '0', unit: '', note: '' }];
              }
          });

          // V14.5: 全方位庫存比對 (包含單詞 Token 比對)
          const getProductMatches = (orderItemName) => {
              if (!Array.isArray(inventory) || inventory.length === 0) return [];
              
              const targetCleaned = Utils.cleanFuzzy(orderItemName);
              // 🔴 V14.5 關鍵：切分單詞
              const tokens = orderItemName.split(/[\s,]+/);
              const cleanTokens = tokens.map(t => Utils.cleanFuzzy(t)).filter(t => t.length > 1);
              
              const matches = inventory.filter(inv => {
                const cleanID = Utils.cleanFuzzy(inv.id);
                const cleanName = Utils.cleanFuzzy(inv.name);
                
                // 1. 全句比對
                const fullMatch = (cleanID.length > 1 && targetCleaned.includes(cleanID)) || 
                                  (cleanName.length > 1 && targetCleaned.includes(cleanName)) ||
                                  (cleanID.length > 1 && cleanID.includes(targetCleaned));
                
                // 2. 🔴 單詞比對 (Token Match) - 專門解決 KOMI-1
                const tokenMatch = cleanTokens.some(t => t === cleanID);

                return fullMatch || tokenMatch;
              });

              const groups = matches.reduce((acc, curr) => {
                const key = `${curr.id}-${curr.name}`;
                const qty = Utils.parseQty(curr.qty);
                
                if (!acc[key]) acc[key] = { id: curr.id, name: curr.name, spec: curr.spec, total: 0, lots: [] };
                
                acc[key].total += qty;
                if (qty > 0) acc[key].lots.push(curr);
                return acc;
              }, {});
              return Object.values(groups);
          };

          const handleUpdateItemQty = (index, value) => {
              const updated = [...editableItems];
              updated[index].currentQty = value;
              setEditableItems(updated);
          };

          const handleSave = async () => {
              setIsSavingDetails(true);
              try {
                const itemsString = editableItems.map(i => `${i.name} x ${i.currentQty}${i.unit} ${i.note ? `(${i.note})` : ''}`).join('\n');
                const success = await onUpdateDetails(order.orderId, { orderType, internalNote, factoryEta, deliveryDate, siteContact, sitePhone, address, items: itemsString });
                if (success) { setSaveSuccess(true); setTimeout(() => setSaveSuccess(false), 3000); }
              } finally { setIsSavingDetails(false); }
          };

          const isHoldOrder = (orderType || '').includes('保留');

          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in font-sans text-gray-800">
              <div className="bg-white w-full max-w-5xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
                <div className={`${isHoldOrder ? 'bg-blue-600' : 'bg-[#222]'} text-white p-4 flex justify-between items-center shrink-0 transition-colors duration-500`}>
                  <div className="flex flex-col">
                    <span className="text-[10px] uppercase font-bold opacity-70 tracking-widest font-sans">Warehouse V14.5</span>
                    <h2 className="text-xl font-bold font-mono">訂單 #{order.orderId}</h2>
                  </div>
                  <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-all"><UI.Close size={24} /></button>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar bg-gray-50 flex-1 font-sans">
                  <ErrorBoundary onClose={onClose}>
                      <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm flex flex-col sm:flex-row gap-6">
                            <label className="flex-1 flex items-center gap-4 cursor-pointer select-none">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isStockConfirmed ? 'bg-teal-500 border-teal-500 shadow-lg' : 'bg-white border-gray-200'}`}>
                                    {isStockConfirmed ? <UI.Check size={28} className="text-white" /> : <UI.DB size={24} className="text-gray-300" />}
                                </div>
                                <div className="flex flex-col">
                                    <span className={`font-bold ${isStockConfirmed ? 'text-teal-700' : 'text-gray-700'}`}>已確認庫存</span>
                                    <span className="text-xs text-gray-400">核對現場存貨與 A06REPORT</span>
                                </div>
                                <input type="checkbox" className="hidden" checked={isStockConfirmed} onChange={() => onUpdateStatus([order.orderId], isStockConfirmed ? '' : '已確認庫存')} disabled={isProcessing} />
                            </label>
                            <div className="hidden sm:block w-px bg-gray-100 h-14 self-center"></div>
                            <label className="flex-1 flex items-center gap-4 cursor-pointer select-none">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isShipped ? 'bg-blue-500 border-blue-500 shadow-lg' : 'bg-white border-gray-200'}`}>
                                    {isShipped ? <UI.Check size={28} className="text-white" /> : <UI.Truck size={24} className="text-gray-300" />}
                                </div>
                                <div className="flex flex-col">
                                    <span className={`font-bold ${isShipped ? 'text-blue-700' : 'text-gray-700'}`}>已排單出貨</span>
                                    <span className="text-xs text-gray-400">安排物流派送並結案</span>
                                </div>
                                <input type="checkbox" className="hidden" checked={isShipped} onChange={() => onUpdateStatus([order.orderId], isShipped ? '已確認庫存' : '已排單出貨')} disabled={isProcessing} />
                            </label>
                      </div>

                      <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-4">
                            <h4 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2">
                                <UI.Truck size={18} className="text-orange-500"/> 物流與備註資訊
                            </h4>
                            <div className="grid grid-cols-2 gap-4">
                                 <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">預計出貨日 (Delivery)</label>
                                    <input type="date" value={deliveryDate} onChange={e=>setDeliveryDate(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg font-mono text-sm bg-gray-50 focus:border-orange-500 outline-none transition-colors font-bold text-gray-700"/>
                                 </div>
                                 <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">訂單分類 (Type)</label>
                                    <input type="text" value={orderType} onChange={e=>setOrderType(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:border-orange-500 outline-none transition-colors font-bold text-gray-700" placeholder="例如: 保留單, 急件"/>
                                 </div>
                            </div>
                            <div className="grid grid-cols-1 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">工廠交期/船班 (Factory ETA)</label>
                                    <input type="text" value={factoryEta} onChange={e=>setFactoryEta(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:border-orange-500 outline-none transition-colors font-bold text-gray-700" placeholder="例如: 12/25 結關"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">內部備註 (Internal Note)</label>
                                    <textarea value={internalNote} onChange={e=>setInternalNote(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 h-24 focus:border-orange-500 outline-none transition-colors" placeholder="公司內部註記事項..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-4">
                            <h4 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2">
                                <UI.User size={18} className="text-blue-500"/> 客戶收貨資訊 (可編輯)
                            </h4>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">現場聯絡人 (On-site Contact)</label>
                                    <input type="text" value={siteContact} onChange={e=>setSiteContact(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-bold text-gray-800"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">現場電話 (On-site Phone)</label>
                                    <input type="text" value={sitePhone} onChange={e=>setSitePhone(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-bold text-gray-800 font-mono"/>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">送貨地址 (Address)</label>
                                <input type="text" value={address} onChange={e=>setAddress(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-bold text-gray-800"/>
                            </div>
                            <div className="bg-blue-50 p-3 rounded-lg text-xs text-blue-600 border border-blue-100 flex items-start gap-2">
                                <UI.Info size={14} className="mt-0.5 shrink-0"/>
                                提示：修改此處資訊後按下「儲存」，系統將更新訂單的收貨資料。
                            </div>
                        </div>
                      </div>

                      <section className="mb-8 font-sans">
                        <div className="flex justify-between items-center mb-4 px-1">
                            <h3 className="text-xs font-black uppercase tracking-widest text-orange-600 font-bold font-sans">訂單商品與庫存批號對照</h3>
                            <div className="flex items-center gap-2 text-[10px] text-gray-400">
                                 <div className={`w-2.5 h-2.5 rounded-full ${inventory.length > 0 ? 'bg-green-500 shadow-sm' : 'bg-red-500 animate-pulse'}`}></div>
                                 A06REPORT 已同步: {inventory.length} 筆
                            </div>
                        </div>
                        
                        <div className="space-y-6">
                          {editableItems.map((item, idx) => {
                              const matches = getProductMatches(item.name);
                              const currentNeed = Utils.parseQty(item.currentQty);
                              return (
                                <div key={idx} className="bg-white border rounded-xl overflow-hidden shadow-sm hover:border-orange-300 transition-all font-sans">
                                    <div className="p-4 bg-gray-50 border-b flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 text-gray-800">
                                        <div className="flex-1 min-w-0 font-sans">
                                            <div className="text-[15px] font-black text-gray-900 leading-tight mb-1">{item.name}</div>
                                            <div className="flex items-center gap-2 text-[10px] text-gray-400 font-medium">
                                                <UI.Info size={12}/> 訂單原文: {item.name}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6 bg-white p-2 rounded-lg border border-gray-200 shadow-inner font-sans shrink-0">
                                            <div className="flex flex-col items-center px-4 border-r border-gray-100">
                                                <span className="text-[9px] font-bold text-gray-400 uppercase mb-0.5">原始下單量</span>
                                                <span className="font-mono text-base font-black text-gray-800">{item.originalQty} <span className="text-[10px] font-normal">{item.unit}</span></span>
                                            </div>
                                            <div className="flex flex-col items-center px-4">
                                                <span className="text-[9px] font-bold text-orange-600 uppercase mb-0.5 font-bold">客服調整數</span>
                                                <div className="flex items-center gap-1.5 font-sans">
                                                    <input type="number" value={item.currentQty} onChange={(e) => handleUpdateItemQty(idx, e.target.value)} className="w-16 p-1 border border-orange-300 rounded text-base font-black text-center outline-none bg-orange-50 focus:ring-2 focus:ring-orange-200 text-orange-700" />
                                                    <span className="text-[11px] font-bold text-gray-500">{item.unit}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 font-sans">
                                            {matches.length > 0 ? (
                                                <div className="grid grid-cols-1 gap-4 font-sans">
                                                    {matches.map((group, gIdx) => (
                                                        <div key={gIdx} className="border border-teal-100 bg-teal-50/10 rounded-lg p-3 font-sans">
                                                            <div className="flex justify-between items-center mb-3 pb-2 border-b border-teal-100">
                                                                <div className="flex flex-col">
                                                                    <div className="flex items-center gap-2 mb-1">
                                                                        <span className="font-mono text-[11px] font-black bg-teal-600 text-white px-1.5 py-0.5 rounded shadow-sm">{group.id}</span>
                                                                        <span className="text-[13px] font-bold text-gray-700 truncate max-w-[200px]">{group.name}</span>
                                                                    </div>
                                                                    <div className="text-[10px] text-gray-400 font-medium">規格: {group.spec || '標規'}</div>
                                                                </div>
                                                                <div className="text-right">
                                                                    <span className="text-[10px] text-gray-400 block uppercase font-bold tracking-tighter">總剩餘庫存</span>
                                                                    <span className={`text-xl font-black ${group.total < currentNeed ? 'text-red-500 underline' : 'text-teal-600'}`}>{group.total}</span>
                                                                </div>
                                                            </div>
                                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 font-sans">
                                                                {group.lots.map((lot, lIdx) => (
                                                                    <div key={lIdx} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col hover:border-teal-400 transition-colors group font-sans">
                                                                                <span className="text-[9px] text-gray-400 font-bold uppercase mb-1 group-hover:text-teal-500 tracking-wider">Batch 批號</span>
                                                                                <span className="font-mono text-sm font-black text-[#c25e00] break-all leading-tight mb-2 font-sans">{Utils.formatBatch(lot.lot) || "無標註"}</span>
                                                                                <div className="mt-auto pt-2 border-t border-gray-50 flex justify-between items-end">
                                                                                    <span className="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">剩餘數量</span>
                                                                                    <span className="font-black text-[15px] text-teal-600 font-mono leading-none">{lot.qty}</span>
                                                                                </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300 font-sans">
                                                    <UI.Search size={44} className="mx-auto text-gray-300 mb-3"/>
                                                    <p className="text-sm text-gray-400 font-black uppercase tracking-widest font-sans">No Match in A06REPORT</p>
                                                    <p className="text-[11px] text-gray-400 mt-2 font-sans px-4">無法在數據分頁中自動匹配到： <span className="font-bold font-mono text-gray-600">"{item.name}"</span></p>
                                                    <p className="text-[9px] text-gray-300 mt-2 italic px-8 font-sans">已啟用【單詞鎖定】：系統已切分品名單詞，正在尋找是否包含 <span className="font-black">komi1</span></p>
                                                </div>
                                            )}
                                    </div>
                                </div>
                              );
                          })}
                        </div>
                      </section>

                      <div className="pt-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 font-sans font-bold">
                        <button onClick={() => confirm(`確定刪除訂單 #${order.orderId}？此操作不可撤回。`) && onDelete([order.orderId]) && onClose()} className="text-red-400 hover:text-red-600 text-sm font-bold flex items-center gap-1.5 px-4 py-2 hover:bg-red-50 rounded-lg transition-colors font-sans"><UI.Trash size={16}/> 刪除單據</button>
                        <button onClick={handleSave} disabled={isSavingDetails} className={`w-full sm:w-auto px-10 py-3.5 rounded-xl text-sm font-black text-white transition-all shadow-lg flex items-center justify-center gap-3 active:scale-95 ${saveSuccess ? 'bg-green-600 shadow-green-100' : 'bg-[#c25e00] hover:bg-[#a04d00] shadow-orange-100'} font-sans font-bold`}>
                            {isSavingDetails ? <UI.Loader size={20} className="animate-spin" /> : saveSuccess ? <UI.Check size={20} /> : <UI.Save size={20} />}
                            {isSavingDetails ? '正在同步數據...' : saveSuccess ? '變更已成功同步' : '儲存數量與所有變更'}
                        </button>
                      </div>
                  </ErrorBoundary>
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [password, setPassword] = useState("");
          const [orders, setOrders] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [filteredOrders, setFilteredOrders] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedIds, setSelectedIds] = useState(new Set()); 
          const [loading, setLoading] = useState(false);
          const [apiError, setApiError] = useState(null);
          const [lastUpdated, setLastUpdated] = useState("");
          const [activeTab, setActiveTab] = useState('all');
          
          const [currentView, setCurrentView] = useState('orders'); 
          const [invSearchText, setInvSearchText] = useState("");
          const [invSearchQty, setInvSearchQty] = useState("");

          const fetchAllData = useCallback(async () => {
            setLoading(true); setApiError(null);
            try {
              const res = await fetch(`${API_URL}?action=getData&t=${Date.now()}`, { redirect: 'follow' });
              const result = await res.json();
              if (result.error) throw new Error(result.error);
              setOrders(result.orders || []);
              setInventory(result.inventory || []);
              setLastUpdated(new Date().toLocaleTimeString());
            } catch (error) { console.error("Fetch Error:", error); setApiError("無法讀取雲端數據"); } 
            finally { setLoading(false); }
          }, []);

          useEffect(() => { if (isLoggedIn) fetchAllData(); }, [isLoggedIn, fetchAllData]);

          useEffect(() => {
            let res = orders;
            if (activeTab === 'received') res = res.filter(o => !o.status);
            else if (activeTab === 'hold') res = res.filter(o => Utils.safeStr(o.orderType).includes('保留'));
            else if (activeTab === 'confirmed') res = res.filter(o => o.status === '已確認庫存');
            else if (activeTab === 'shipped') res = res.filter(o => o.status === '已排單出貨');
            if (searchTerm) {
              const t = searchTerm.toLowerCase();
              res = res.filter(o => Utils.safeStr(o.company).toLowerCase().includes(t) || Utils.safeStr(o.orderId).toLowerCase().includes(t));
            }
            setFilteredOrders(res);
          }, [searchTerm, orders, activeTab]);

          // --- V14.5 核心邏輯：加入單詞比對 Token Match ---
          const { groupedInventory, diagnosisData } = useMemo(() => {
              const pendingItems = []; 
              
              orders.forEach(o => {
                  const isHold = Utils.safeStr(o.orderType).includes('保留');
                  const isShipped = o.status === '已排單出貨'; 
                  
                  if (isHold && !isShipped) {
                      const rawItems = Utils.safeStr(o.items).split('\n').filter(l => l.trim() !== "");
                      rawItems.forEach(line => {
                          let s = Utils.safeStr(line).replace(/^(\d{1,3}[\.\s])\s*/, '').trim();
                          
                          const match = s.match(/^(.*)[\sxX\*＊\u00d7]+([0-9,\.]+)\s*([^\d\s]*)$/);
                          
                          let qty = 1;
                          if (match && match[1] && match[2]) {
                              qty = Utils.parseQty(match[2]);
                              s = match[1].trim(); 
                          }

                          const cleanFullLine = Utils.cleanFuzzy(s); 
                          // 🔴 V14.5: 恢復切分 Token 邏輯
                          const tokens = s.split(/[\s,]+/); 
                          const cleanTokens = tokens.map(t => Utils.cleanFuzzy(t)).filter(t => t.length > 1);

                          if (qty > 0) {
                              pendingItems.push({
                                  company: o.company,
                                  qty: qty,
                                  originalName: s, 
                                  cleanName: cleanFullLine, 
                                  cleanTokens: cleanTokens, // 保存 Token 供比對用
                                  orderId: o.orderId,
                                  orderType: o.orderType,
                                  matched: false 
                              });
                          }
                      });
                  }
              });

              // 2. 準備搜尋條件
              const tStr = Utils.cleanFuzzy(invSearchText); 
              const minQty = parseFloat(invSearchQty);
              const hasMinQty = !isNaN(minQty);
              const hasSearch = invSearchText.trim() !== "" || hasMinQty;

              // 3. 庫存比對 (全方位 V14.5)
              const allGroups = inventory.reduce((acc, curr) => {
                  const qty = Utils.parseQty(curr.qty);
                  
                  const key = `${curr.id}_${curr.name}`;
                  if (!acc[key]) {
                      const cleanId = Utils.cleanFuzzy(curr.id);     
                      const cleanName = Utils.cleanFuzzy(curr.name); 
                      
                      let totalRes = 0;
                      let detailsRes = [];

                      pendingItems.forEach(pItem => {
                          const pClean = pItem.cleanName; 
                          
                          // 1. 全句比對 (保留原本邏輯)
                          const reverseIDMatch = cleanId.length > 1 && pClean.includes(cleanId);
                          const reverseNameMatch = cleanName.length > 1 && pClean.includes(cleanName);
                          const normalMatch = (cleanId.length > 1 && cleanId.includes(pClean));

                          // 2. 🔴 單詞比對 (新增 V14.5)
                          // 只要訂單的某個單字 (komi1) 等於 庫存ID (komi1)，就算中！
                          const tokenMatch = pItem.cleanTokens.some(t => t === cleanId);

                          if (reverseIDMatch || reverseNameMatch || normalMatch || tokenMatch) {
                              totalRes += pItem.qty;
                              detailsRes.push(pItem);
                              pItem.matched = true; 
                          }
                      });

                      acc[key] = {
                          id: curr.id,
                          name: curr.name,
                          spec: curr.spec,
                          packing: curr.packing,
                          usage: curr.usage,
                          totalQty: 0,
                          reservedQty: totalRes, 
                          reserveDetails: detailsRes, 
                          batches: []
                      };
                  }
                  acc[key].totalQty += qty;
                  if (qty > 0) acc[key].batches.push({ lot: Utils.formatBatch(curr.lot), qty: qty });
                  return acc;
              }, {});

              // 4. 篩選結果
              const results = Object.values(allGroups).filter(group => {
                  if (!hasSearch) return false; 
                  
                  let matchText = true;
                  let matchQty = true;

                  if (tStr) {
                      matchText = Utils.cleanFuzzy(group.id).includes(tStr) ||
                                  Utils.cleanFuzzy(group.name).includes(tStr) ||
                                  group.batches.some(b => Utils.cleanFuzzy(b.lot).includes(tStr));
                  }
                  if (hasMinQty) {
                      matchQty = (group.totalQty - group.reservedQty) >= minQty;
                  }
                  return matchText && matchQty;
              });

              return { 
                  groupedInventory: results.sort((a, b) => b.totalQty - a.totalQty), 
                  diagnosisData: pendingItems 
              };

          }, [inventory, orders, invSearchText, invSearchQty]);

          const sendCommand = async (p) => { 
              try { 
                  await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ payload: JSON.stringify(p) }) }); 
                  return true; 
              } catch (e) { 
                  return false; 
              } 
          };

          const handleUpdateDetails = async (id, details) => {
              const ok = await sendCommand({ action: 'updateDetails', orderId: id, ...details });
              if (ok) {
                  setOrders(prev => prev.map(o => o.orderId === id ? { ...o, ...details } : o));
                  return true;
              }
              return false;
          };

          const handleStatusUpdate = async (ids, status) => {
              const targetIds = ids || Array.from(selectedIds);
              const action = status === 'delete' ? 'delete' : 'updateStatus';
              
              if (status === 'delete') {
                  setOrders(prev => prev.filter(o => !targetIds.includes(o.orderId)));
                  if (selectedOrder && targetIds.includes(selectedOrder.orderId)) setSelectedOrder(null);
              } else {
                  setOrders(prev => prev.map(o => targetIds.includes(o.orderId) ? { ...o, status } : o));
                  if (selectedOrder && targetIds.includes(selectedOrder.orderId)) setSelectedOrder(p => p ? ({ ...p, status }) : null);
              }
              setSelectedIds(new Set());

              const success = await sendCommand({ action, status, ids: targetIds });
              if (!success) {
                  fetchAllData();
                  alert("操作失敗，請檢查網路連線");
              }
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#111] flex items-center justify-center p-4">
                <div className="w-full max-w-sm bg-white/5 p-10 rounded-[2rem] border border-white/10 shadow-2xl text-center font-sans font-bold">
                  <h1 className="text-3xl font-black text-white tracking-[0.2em] mb-10 font-sans">TILE PARK</h1>
                  <form onSubmit={(e) => { e.preventDefault(); if(password==='8888') setIsLoggedIn(true); }} className="space-y-6">
                    <input type="password" placeholder="PASSWORD" className="w-full px-6 py-4 bg-black/40 border border-white/10 rounded-2xl text-white text-center tracking-[1em] focus:border-orange-500 outline-none transition-all font-mono" value={password} onChange={e=>setPassword(e.target.value)} autoFocus />
                    <button type="submit" className="w-full bg-[#c25e00] text-white py-4 rounded-2xl font-black tracking-widest hover:bg-orange-600 transition-all uppercase font-bold shadow-lg">Login</button>
                  </form>
                </div>
              </div>
            );
          }

          const tabs = [
              { id: 'all', label: '全部', count: orders.length },
              { id: 'received', label: '待處理', count: orders.filter(o => !o.status).length },
              { id: 'hold', label: '保留單', count: orders.filter(o => Utils.safeStr(o.orderType).includes('保留')).length },
              { id: 'confirmed', label: '已確認', count: orders.filter(o => o.status === '已確認庫存').length },
              { id: 'shipped', label: '已出貨', count: orders.filter(o => o.status === '已排單出貨').length },
          ];

          return (
            <div className="h-screen bg-gray-100 flex flex-col md:flex-row font-sans">
              <aside className="bg-[#1a1a1a] text-white md:w-64 flex flex-col p-6 shrink-0">
                <div className="mb-10 font-black text-xl">TILE PARK <span className="block text-[10px] text-orange-500">Warehouse V14.5</span></div>
                <nav className="space-y-2">
                    <button onClick={() => setCurrentView('orders')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'orders' ? 'bg-orange-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.File size={18} /> 訂單管理</button>
                    <button onClick={() => {setCurrentView('inventory'); setInvSearchText(""); setInvSearchQty("");}} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'inventory' ? 'bg-teal-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.Box size={18} /> 庫存查詢</button>
                    <button onClick={() => setCurrentView('diagnosis')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'diagnosis' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.Bug size={18} /> 系統診斷</button>
                </nav>
                <div className="mt-auto text-[10px] text-gray-500 text-center">{lastUpdated}</div>
              </aside>

              <main className="flex-1 flex flex-col min-h-0 overflow-hidden relative">
                {currentView === 'orders' && (
                    <div className="flex-1 overflow-y-auto p-4">
                        <header className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold text-gray-800">訂單管理</h2>
                            <button onClick={fetchAllData} className="p-2 bg-white rounded border"><UI.Refresh/></button>
                        </header>
                        <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                            {['all','received','hold','confirmed','shipped'].map(id => (
                                <button key={id} onClick={()=>{setActiveTab(id);setSelectedIds(new Set())}} className={`px-4 py-2 rounded-xl text-xs font-bold border ${activeTab===id?'bg-orange-600 text-white':'bg-white text-gray-600'}`}>{id} ({id==='all'?orders.length:orders.filter(o=>(id==='received'?!o.status:(id==='hold'?Utils.safeStr(o.orderType).includes('保留'):(id==='confirmed'?o.status==='已確認庫存':o.status==='已排單出貨')))).length})</button>
                            ))}
                        </div>
                        <div className="bg-white rounded-xl shadow overflow-hidden">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-50 text-gray-500 font-bold border-b"><tr><th className="p-3 w-10"></th><th className="p-3">單號</th><th className="p-3">狀態</th><th className="p-3">客戶</th><th className="p-3">Type</th><th className="p-3">Detail</th></tr></thead>
                                <tbody className="divide-y">{filteredOrders.map(o=>(<tr key={o.orderId} onClick={()=>setSelectedOrder(o)} className="hover:bg-gray-50 cursor-pointer"><td className="p-3" onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.has(o.orderId)} onChange={()=>{const n=new Set(selectedIds);n.has(o.orderId)?n.delete(o.orderId):n.add(o.orderId);setSelectedIds(n)}}/></td><td className="p-3 font-mono font-bold">{o.orderId}</td><td className="p-3"><StatusBadge status={o.status}/></td><td className="p-3 font-bold">{o.company}</td><td className="p-3 text-xs text-gray-500">{o.orderType}</td><td className="p-3"><button className="text-xs border px-2 py-1 rounded">View</button></td></tr>))}</tbody>
                            </table>
                        </div>
                        {selectedIds.size>0 && <div className="fixed bottom-4 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-full shadow-xl flex gap-4 border"><span className="font-bold">{selectedIds.size} selected</span><button onClick={()=>handleStatusUpdate(null,'已確認庫存')} className="text-teal-600 font-bold">確認庫存</button><button onClick={()=>handleStatusUpdate(null,'已排單出貨')} className="text-blue-600 font-bold">排單出貨</button></div>}
                    </div>
                )}

                {currentView === 'inventory' && (
                    <div className="flex-1 flex flex-col">
                        <header className="bg-white border-b p-4 shadow-sm z-10">
                            <div className="flex gap-4 max-w-3xl">
                                <div className="relative flex-1"><UI.Search className="absolute left-3 top-3 text-gray-400"/><input type="text" placeholder="搜尋品名/貨號 (支援模糊比對)..." className="w-full pl-10 p-2.5 bg-gray-50 border rounded-lg" value={invSearchText} onChange={e=>setInvSearchText(e.target.value)} autoFocus/></div>
                                <div className="relative w-32"><UI.Filter className="absolute left-3 top-3 text-gray-400"/><input type="number" placeholder="數量..." className="w-full pl-10 p-2.5 bg-gray-50 border rounded-lg" value={invSearchQty} onChange={e=>setInvSearchQty(e.target.value)}/></div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 bg-gray-50">
                            {groupedInventory.length === 0 ? (
                                <div className="text-center py-20 text-gray-400"><UI.Box size={48} className="mx-auto mb-4 opacity-20"/><p>無符合資料</p></div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                    {groupedInventory.map((item, idx) => (
                                        <div key={idx} className={`bg-white rounded-xl shadow-sm border overflow-hidden ${item.reservedQty>0?'border-orange-300 ring-1 ring-orange-100':''}`}>
                                            <div className="p-4 border-b bg-gray-50/50 flex justify-between items-start">
                                                <div>
                                                    <span className="bg-teal-100 text-teal-800 text-[10px] px-2 py-1 rounded font-mono font-bold">{item.id}</span>
                                                    <h3 className="font-bold text-lg mt-1">{item.name}</h3>
                                                    <div className="text-[10px] text-gray-500 mt-1 space-x-2"><span>規:{item.spec}</span><span>包:{item.packing}</span><span>用:{item.usage}</span></div>
                                                </div>
                                                <div className="text-right"><span className="text-xs text-gray-400 font-bold block">TOTAL</span><span className="text-2xl font-black text-teal-600">{item.totalQty.toLocaleString()}</span></div>
                                            </div>
                                            <div className="p-3 bg-white flex justify-between items-center border-b">
                                                <div className="flex flex-col"><span className="text-[10px] text-gray-400 font-bold">RESERVED</span><span className={`font-mono font-bold ${item.reservedQty>0?'text-orange-600':'text-gray-300'}`}>{item.reservedQty>0?`-${item.reservedQty}`:'0'}</span></div>
                                                <div className="flex flex-col text-right"><span className="text-[10px] text-gray-400 font-bold">AVAILABLE</span><span className="font-mono text-xl font-black text-gray-800">{(item.totalQty-item.reservedQty).toLocaleString()}</span></div>
                                            </div>
                                            {item.reservedQty > 0 && (
                                                <div className="bg-orange-50 p-3 border-b border-orange-100 space-y-1">
                                                    <div className="text-[10px] font-bold text-orange-400 flex items-center gap-1"><UI.Lock size={10}/> 保留明細</div>
                                                    {item.reserveDetails.map((det, dIdx)=>(
                                                        <div key={dIdx} className="flex justify-between text-xs text-orange-900"><span>{det.company} ({det.orderId})</span><span className="font-mono font-bold">{det.qty}</span></div>
                                                    ))}
                                                </div>
                                            )}
                                            <div className="p-3 bg-gray-50 space-y-1 max-h-32 overflow-y-auto custom-scrollbar">
                                                {item.batches.map((b, bi)=>(<div key={bi} className="flex justify-between text-xs text-gray-600 border-b border-gray-100 last:border-0 pb-1">
                                                    <span className="font-mono font-bold">{b.lot||'No Batch'}</span>
                                                    <span className="font-mono">{b.qty}</span>
                                                </div>))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {currentView === 'diagnosis' && (
                    <div className="flex-1 overflow-y-auto p-6 bg-gray-100">
                        <h2 className="text-2xl font-black text-gray-800 mb-6 flex items-center gap-2"><UI.Bug className="text-red-500"/> 系統保留單診斷器</h2>
                        
                        <div className="bg-white rounded-xl shadow-sm border p-6 mb-6">
                            <h3 className="font-bold text-gray-700 border-b pb-2 mb-4">使用說明</h3>
                            <ul className="list-disc pl-5 text-sm text-gray-600 space-y-1">
                                <li>此頁面列出所有系統偵測到的<b>「保留且未出貨」</b>訂單項目。</li>
                                <li>如果您的訂單<b>不在列表中</b>：請檢查 Google Sheet 的 <b>Type (分類)</b> 是否包含「保留」，且 Status (狀態) 不是「已排單出貨」。</li>
                                <li><b>MATCHED (綠色)</b>：成功連結。系統透過「全句」或「單詞」找到了對應的庫存 ID。</li>
                                <li><b>UNMATCHED (紅色)</b>：找不到庫存。請檢查下方的「清洗後代碼」或「單詞」是否完全等於庫存表 A 欄的 ID。</li>
                            </ul>
                        </div>

                        <div className="space-y-2">
                            {diagnosisData.length === 0 ? (
                                <div className="text-center p-10 text-gray-400 font-bold">目前沒有偵測到任何保留單</div>
                            ) : (
                                diagnosisData.map((item, idx) => (
                                    <div key={idx} className={`p-4 rounded-lg border flex flex-col md:flex-row justify-between gap-4 ${item.matched ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                        <div className="flex-1 space-y-1">
                                            <div className="flex items-center gap-2">
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded text-white ${item.matched ? 'bg-green-600' : 'bg-red-600'}`}>
                                                    {item.matched ? 'MATCHED' : 'UNMATCHED'}
                                                </span>
                                                <span className="font-mono font-bold text-gray-700">#{item.orderId}</span>
                                                <span className="text-xs text-gray-500">({item.company})</span>
                                            </div>
                                            <div className="font-bold text-gray-800">{item.originalName}</div>
                                            <div className="font-mono text-xs text-gray-400 break-all">全句清洗: {item.cleanName}</div>
                                            <div className="flex gap-1 flex-wrap">
                                                {/* 顯示系統切分出來的單詞，方便除錯 */}
                                                {item.cleanTokens.map(t => <span className="bg-gray-200 text-gray-600 text-[10px] px-1 rounded">{t}</span>)}
                                            </div>
                                        </div>
                                        <div className="text-right md:w-32 flex flex-col justify-center">
                                            <span className="text-xs text-gray-400 font-bold">數量 QTY</span>
                                            <span className="text-2xl font-black text-gray-800">{item.qty}</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                )}
              </main>

              {selectedOrder && <OrderDetailModal order={selectedOrder} inventory={inventory} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleStatusUpdate} onUpdateDetails={handleUpdateDetails} onDelete={ids => handleStatusUpdate(ids, 'delete')} isProcessing={loading} />}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
