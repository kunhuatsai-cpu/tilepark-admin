<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Park Admin System - V16.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; font-family: 'Noto Sans TC', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-spin-fast { animation: spin 0.7s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        
        // 🔴 Web App 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyKP7YGKdSFYYJMEI2tH7t3u3lILjfc3XGK-xlFx0o3se2_QnnvP-vNtEGcgZXt1Xx7/exec";

        // --- 安全工具集 ---
        const Utils = {
            safeStr: (v) => String(v || '').trim(),
            safeDate: (v) => { const s = Utils.safeStr(v); return s.includes('T') ? s.split('T')[0] : s; },
            parseQty: (v) => { const s = Utils.safeStr(v).replace(/,/g, ''); const num = parseFloat(s); return isNaN(num) ? 0 : num; },
            cleanFuzzy: (v) => { return Utils.safeStr(v).normalize('NFKC').toLowerCase().replace(/[^\w\u4e00-\u9fa5]/g, ''); },
            formatBatch: (v) => { const s = Utils.safeStr(v); if (s.toUpperCase().includes('E+')) { const num = parseFloat(s); return isNaN(num) ? s : String(num); } return s; }
        };

        // 🌟 圖片壓縮工具
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 1000;
                        const MAX_HEIGHT = 1000;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // 壓縮為 70% 品質 JPEG
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

        // --- UI Icons ---
        const IconWrap = ({ d, size = 18, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>);
        const UI = {
          Search: (p) => <IconWrap {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />,
          Refresh: (p) => <IconWrap {...p} d={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />,
          Close: (p) => <IconWrap {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
          Check: (p) => <IconWrap {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
          Truck: (p) => <IconWrap {...p} d={<><rect x="1" y="3" width="15" height="13" rx="2" ry="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>} />,
          Loader: (p) => <IconWrap {...p} d={<><path d="M21 12a9 9 0 1 1-6.219-8.56" /></>} />,
          Save: (p) => <IconWrap {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />,
          DB: (p) => <IconWrap {...p} d={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />,
          Trash: (p) => <IconWrap {...p} d={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
          Info: (p) => <IconWrap {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />,
          File: (p) => <IconWrap {...p} d={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>} />,
          User: (p) => <IconWrap {...p} d={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
          Box: (p) => <IconWrap {...p} d={<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />,
          Filter: (p) => <IconWrap {...p} d={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />,
          Lock: (p) => <IconWrap {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
          Alert: (p) => <IconWrap {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
          Clock: (p) => <IconWrap {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
          Bug: (p) => <IconWrap {...p} d={<><rect width="8" height="14" x="8" y="6" rx="4"/><path d="m19 13-3.25-1.62"/><path d="m5 13 3.25-1.62"/><path d="m19 19-3.5-3.5"/><path d="m5 19 3.5-3.5"/><path d="m19 7-3.5 3.5"/><path d="m5 7 3.5 3.5"/></>} />,
          Link: (p) => <IconWrap {...p} d={<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>} />,
          Camera: (p) => <IconWrap {...p} d={<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>} />
        };

        const StatusBadge = ({ status }) => {
          let color = "bg-green-100 text-green-800 border-green-200";
          if (status === '已確認庫存') color = "bg-teal-100 text-teal-800 border-teal-200";
          if (status === '已排單出貨') color = "bg-blue-100 text-blue-800 border-blue-200";
          return <span className={`px-2 py-1 rounded-full text-[10px] font-bold border ${color} whitespace-nowrap`}>{status || '已接收'}</span>;
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) return <div className="p-10 text-center"><UI.Alert className="text-red-500 mx-auto mb-2"/>錯誤</div>;
                return this.props.children;
            }
        }

        const OrderDetailModal = ({ order, inventory, onClose, onUpdateStatus, onUpdateDetails, onDelete, isProcessing }) => {
          if (!order) return null;
          
          const isStockConfirmed = order.status === '已確認庫存' || order.status === '已排單出貨';
          const isShipped = order.status === '已排單出貨';

          const [orderType, setOrderType] = useState(Utils.safeStr(order.orderType));
          const [internalNote, setInternalNote] = useState(Utils.safeStr(order.internalNote));
          const [factoryEta, setFactoryEta] = useState(Utils.safeStr(order.factoryEta));
          const [deliveryDate, setDeliveryDate] = useState(Utils.safeDate(order.deliveryDate));
          const [siteContact, setSiteContact] = useState(Utils.safeStr(order.siteContact)); 
          const [sitePhone, setSitePhone] = useState(Utils.safeStr(order.sitePhone));
          const [address, setAddress] = useState(Utils.safeStr(order.address || order.shippingAddress));
          
          // 物流欄位
          const [trackingNumber, setTrackingNumber] = useState(Utils.safeStr(order.trackingNumber));
          const [shippingMethod, setShippingMethod] = useState(Utils.safeStr(order.shippingMethod));
          const [receiptUrl, setReceiptUrl] = useState(Utils.safeStr(order.receiptUrl));

          const [isSavingDetails, setIsSavingDetails] = useState(false);
          const [saveSuccess, setSaveSuccess] = useState(false);
          const [isUploading, setIsUploading] = useState(false); // 上傳狀態

          const fileInputRef = useRef(null); // 檔案輸入參照

          const [editableItems, setEditableItems] = useState(() => {
              try {
                const rawItems = Utils.safeStr(order.items).split('\n').filter(l => l.trim() !== "");
                return rawItems.map(line => {
                    let s = Utils.safeStr(line).replace(/\u3000/g, ' ').replace(/^["']|["']$/g, '').trim();
                    s = s.replace(/^(\d{1,3}[\.\s])\s*/, '');
                    const match = s.match(/^(.*)[\sxX\*＊\u00d7]+([0-9,\.]+)\s*([^\d\s]*)$/);
                    if (match && match[1] && match[2]) {
                        return { name: match[1].trim(), originalQty: match[2].trim(), currentQty: match[2].trim(), unit: match[3] || '', note: '' };
                    }
                    return { name: s, originalQty: '1', currentQty: '1', unit: '', note: '' };
                });
              } catch (e) { return [{ name: "解析錯誤", originalQty: '0', currentQty: '0', unit: '', note: '' }]; }
          });

          const getProductMatches = (orderItemName) => {
              if (!Array.isArray(inventory) || inventory.length === 0) return [];
              const targetCleaned = Utils.cleanFuzzy(orderItemName);
              const tokens = orderItemName.split(/[\s,]+/).filter(t => t.length > 0); 
              const cleanTokens = tokens.map(t => Utils.cleanFuzzy(t)).filter(t => t.length > 0);
              let exactIdMatch = null;
              for (let inv of inventory) {
                  const cleanID = Utils.cleanFuzzy(inv.id);
                  if (cleanID.length > 2 && cleanTokens.includes(cleanID)) { exactIdMatch = cleanID; break; }
              }
              const matches = inventory.filter(inv => {
                const cleanID = Utils.cleanFuzzy(inv.id); const cleanName = Utils.cleanFuzzy(inv.name);
                if (exactIdMatch) return cleanID === exactIdMatch;
                if (cleanName.length > 2 && targetCleaned.includes(cleanName)) return true;
                if (cleanID.length > 2 && targetCleaned.includes(cleanID)) return true;
                return false;
              });
              const groups = matches.reduce((acc, curr) => {
                const key = `${curr.id}-${curr.name}`;
                const qty = Utils.parseQty(curr.qty);
                if (!acc[key]) acc[key] = { id: curr.id, name: curr.name, spec: curr.spec, total: 0, lots: [] };
                acc[key].total += qty;
                if (qty > 0) acc[key].lots.push(curr);
                return acc;
              }, {});
              return Object.values(groups);
          };

          const handleUpdateItemQty = (index, value) => {
              const updated = [...editableItems];
              updated[index].currentQty = value;
              setEditableItems(updated);
          };

          // 🌟 處理檔案選擇與上傳
          const handleFileChange = async (e) => {
              const file = e.target.files[0];
              if (!file) return;

              setIsUploading(true);
              try {
                  const compressedBase64 = await compressImage(file);
                  const payload = {
                      action: 'uploadReceipt',
                      orderId: order.orderId,
                      fileData: compressedBase64
                  };
                  
                  // 發送上傳請求 (移除 no-cors 以便讀取回傳值)
                  const response = await fetch(API_URL, {
                      method: 'POST',
                      body: new URLSearchParams({ payload: JSON.stringify(payload) })
                  });
                  
                  const result = await response.json();

                  if (result.result === 'success' && result.url) {
                      setReceiptUrl(result.url); // 立即更新介面顯示連結
                      alert("✅ 上傳成功！連結已自動填入。");
                  } else {
                      alert("⚠️ 上傳可能完成但未回傳連結，請稍後重整確認。");
                  }

              } catch (error) {
                  console.error(error);
                  alert("❌ 上傳失敗，請檢查網路或重試");
              } finally {
                  setIsUploading(false);
              }
          };

          const handleSave = async () => {
              setIsSavingDetails(true);
              try {
                const itemsString = editableItems.map(i => `${i.name} x ${i.currentQty}${i.unit} ${i.note ? `(${i.note})` : ''}`).join('\n');
                const success = await onUpdateDetails(order.orderId, { 
                    orderType, internalNote, factoryEta, deliveryDate, siteContact, sitePhone, address, 
                    items: itemsString,
                    trackingNumber, shippingMethod, receiptUrl 
                });
                if (success) { setSaveSuccess(true); setTimeout(() => setSaveSuccess(false), 3000); }
              } finally { setIsSavingDetails(false); }
          };

          const isHoldOrder = (orderType || '').includes('保留');

          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in font-sans text-gray-800">
              <div className="bg-white w-full max-w-5xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh] h-[95dvh] relative">
                <div className={`p-4 flex justify-between items-center shrink-0 text-white ${order.status === '已排單出貨' ? 'bg-blue-600' : 'bg-[#222]'}`}>
                  <div className="flex flex-col"><span className="text-[10px] uppercase font-bold opacity-70 tracking-widest font-sans">Warehouse V16.4</span><h2 className="text-xl font-bold font-mono">訂單 #{order.orderId}</h2></div>
                  <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-all"><UI.Close size={24} /></button>
                </div>
                <div className="p-6 overflow-y-auto custom-scrollbar bg-gray-50 flex-1 font-sans pb-20">
                  <ErrorBoundary onClose={onClose}>
                      {/* 狀態切換 */}
                      <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm flex flex-col sm:flex-row gap-6">
                            <label className="flex-1 flex items-center gap-4 cursor-pointer select-none">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isStockConfirmed ? 'bg-teal-500 border-teal-500 shadow-lg' : 'bg-white border-gray-200'}`}>
                                    {isStockConfirmed ? <UI.Check size={28} className="text-white" /> : <UI.DB size={24} className="text-gray-300" />}
                                </div>
                                <div className="flex flex-col"><span className={`font-bold ${isStockConfirmed ? 'text-teal-700' : 'text-gray-700'}`}>已確認庫存</span><span className="text-xs text-gray-400">核對現場存貨與 A06REPORT</span></div>
                                <input type="checkbox" className="hidden" checked={isStockConfirmed} onChange={() => onUpdateStatus([order.orderId], isStockConfirmed ? '' : '已確認庫存')} disabled={isProcessing} />
                            </label>
                            <div className="hidden sm:block w-px bg-gray-100 h-14 self-center"></div>
                            <label className="flex-1 flex items-center gap-4 cursor-pointer select-none">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center border-2 transition-all ${isShipped ? 'bg-blue-500 border-blue-500 shadow-lg' : 'bg-white border-gray-200'}`}>
                                    {isShipped ? <UI.Check size={28} className="text-white" /> : <UI.Truck size={24} className="text-gray-300" />}
                                </div>
                                <div className="flex flex-col"><span className={`font-bold ${isShipped ? 'text-blue-700' : 'text-gray-700'}`}>已排單出貨</span><span className="text-xs text-gray-400">填寫下方貨運資訊供客戶查詢</span></div>
                                <input type="checkbox" className="hidden" checked={isShipped} onChange={() => onUpdateStatus([order.orderId], isShipped ? '已確認庫存' : '已排單出貨')} disabled={isProcessing} />
                            </label>
                      </div>

                      {/* 🌟 V16.4 更新：物流與簽單管理 (含拍照按鈕) */}
                      <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-5 mb-6">
                          <h4 className="font-bold text-blue-800 flex items-center gap-2 mb-4"><UI.Truck size={18}/> 物流與簽單管理 (前台可見)</h4>
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                              <div>
                                  <label className="block text-xs font-bold text-gray-400 mb-1">貨運單號 (Tracking No.)</label>
                                  <input type="text" value={trackingNumber} onChange={e=>setTrackingNumber(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 outline-none font-bold font-mono" placeholder="輸入單號..."/>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-gray-400 mb-1">出貨方式 (Method)</label>
                                  <select value={shippingMethod} onChange={e=>setShippingMethod(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 outline-none font-bold">
                                      <option value="">選擇方式...</option>
                                      <option value="新竹物流">新竹物流</option>
                                      <option value="大榮貨運">大榮貨運</option>
                                      <option value="黑貓宅急便">黑貓宅急便</option>
                                      <option value="回頭車">回頭車</option>
                                      <option value="公司車">公司車</option>
                                      <option value="自取">自取</option>
                                  </select>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-gray-400 mb-1">簽單/照片 (Receipt)</label>
                                  <div className="flex gap-2 items-center">
                                      {/* 隱藏的檔案輸入 */}
                                      <input 
                                         type="file" 
                                         accept="image/*" 
                                         capture="environment" 
                                         className="hidden" 
                                         ref={fileInputRef} 
                                         onChange={handleFileChange} 
                                      />
                                      
                                      <div className="flex-1 relative">
                                          <input type="text" value={receiptUrl} onChange={e=>setReceiptUrl(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 outline-none" placeholder="連結或點擊右側拍照..."/>
                                          {receiptUrl && <a href={receiptUrl} target="_blank" className="absolute right-2 top-1/2 -translate-y-1/2 text-blue-500 hover:text-blue-700"><UI.Link size={16}/></a>}
                                      </div>

                                      <button 
                                         onClick={() => fileInputRef.current.click()} 
                                         disabled={isUploading}
                                         className={`px-3 py-2 rounded-lg font-bold text-xs flex items-center gap-1 text-white shadow-sm transition-all ${isUploading ? 'bg-gray-400 cursor-not-allowed' : 'bg-teal-500 hover:bg-teal-600 active:scale-95'}`}
                                      >
                                         {isUploading ? <UI.Loader size={14} className="animate-spin"/> : <UI.Camera size={14}/>}
                                         {isUploading ? '上傳中' : '上傳檔案'}
                                      </button>
                                  </div>
                              </div>
                          </div>
                      </div>

                      {/* 原有訂單資訊 (縮減版) */}
                      <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-4">
                            <h4 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2"><UI.File size={18} className="text-gray-400"/> 基本資料</h4>
                            <div className="grid grid-cols-2 gap-4">
                                 <div><label className="block text-xs font-bold text-gray-400 mb-1">預計出貨日</label><input type="date" value={deliveryDate} onChange={e=>setDeliveryDate(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:border-orange-500 outline-none font-bold"/></div>
                                 <div><label className="block text-xs font-bold text-gray-400 mb-1">訂單分類</label><input type="text" value={orderType} onChange={e=>setOrderType(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:border-orange-500 outline-none font-bold"/></div>
                            </div>
                            <div className="grid grid-cols-1 gap-4">
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">工廠交期 (ETA)</label><input type="text" value={factoryEta} onChange={e=>setFactoryEta(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:border-orange-500 outline-none font-bold"/></div>
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">內部備註</label><textarea value={internalNote} onChange={e=>setInternalNote(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 h-24 focus:border-orange-500 outline-none"></textarea></div>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <h4 className="font-bold text-gray-700 flex items-center gap-2 border-b pb-2"><UI.User size={18} className="text-gray-400"/> 收貨資訊 (可編輯)</h4>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">現場聯絡人</label><input type="text" value={siteContact} onChange={e=>setSiteContact(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 outline-none font-bold"/></div>
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">現場電話</label><input type="text" value={sitePhone} onChange={e=>setSitePhone(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-bold text-gray-800 font-mono"/></div>
                            </div>
                            <div><label className="block text-xs font-bold text-gray-400 mb-1">送貨地址</label><input type="text" value={address} onChange={e=>setAddress(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all font-bold text-gray-800"/></div>
                            <div className="bg-blue-50 p-3 rounded-lg text-xs text-blue-600 border border-blue-100 flex items-start gap-2"><UI.Info size={14} className="mt-0.5 shrink-0"/>提示：修改此處資訊後按下「儲存」，系統將更新訂單的收貨資料。</div>
                        </div>
                      </div>
                      <section className="mb-8 font-sans">
                        <div className="flex justify-between items-center mb-4 px-1">
                            <h3 className="text-xs font-black uppercase tracking-widest text-orange-600 font-bold font-sans">訂單商品與庫存批號對照</h3>
                            <div className="flex items-center gap-2 text-[10px] text-gray-400"><div className={`w-2.5 h-2.5 rounded-full ${inventory.length > 0 ? 'bg-green-500 shadow-sm' : 'bg-red-500 animate-pulse'}`}></div>A06REPORT 已同步: {inventory.length} 筆</div>
                        </div>
                        <div className="space-y-6">
                          {editableItems.map((item, idx) => {
                              const matches = getProductMatches(item.name);
                              const currentNeed = Utils.parseQty(item.currentQty);
                              return (
                                <div key={idx} className="bg-white border rounded-xl overflow-hidden shadow-sm hover:border-orange-300 transition-all font-sans">
                                    <div className="p-4 bg-gray-50 border-b flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 text-gray-800">
                                        <div className="flex-1 min-w-0 font-sans">
                                            <div className="text-[15px] font-black text-gray-900 leading-tight mb-1">{item.name}</div>
                                            <div className="flex items-center gap-2 text-[10px] text-gray-400 font-medium"><UI.Info size={12}/> 訂單原文: {item.name}</div>
                                        </div>
                                        <div className="flex items-center gap-6 bg-white p-2 rounded-lg border border-gray-200 shadow-inner font-sans shrink-0">
                                            <div className="flex flex-col items-center px-4 border-r border-gray-100"><span className="text-[9px] font-bold text-gray-400 uppercase mb-0.5">原始下單量</span><span className="font-mono text-base font-black text-gray-800">{item.originalQty} <span className="text-[10px] font-normal">{item.unit}</span></span></div>
                                            <div className="flex flex-col items-center px-4"><span className="text-[9px] font-bold text-orange-600 uppercase mb-0.5 font-bold">客服調整數</span><div className="flex items-center gap-1.5 font-sans"><input type="number" value={item.currentQty} onChange={(e) => handleUpdateItemQty(idx, e.target.value)} className="w-16 p-1 border border-orange-300 rounded text-base font-black text-center outline-none bg-orange-50 focus:ring-2 focus:ring-orange-200 text-orange-700" /><span className="text-[11px] font-bold text-gray-500">{item.unit}</span></div></div>
                                        </div>
                                    </div>
                                    <div className="p-4 font-sans">
                                            {matches.length > 0 ? (
                                                <div className="grid grid-cols-1 gap-4 font-sans">
                                                    {matches.map((group, gIdx) => (
                                                        <div key={gIdx} className="border border-teal-100 bg-teal-50/10 rounded-lg p-3 font-sans">
                                                            <div className="flex justify-between items-center mb-3 pb-2 border-b border-teal-100">
                                                                <div className="flex flex-col"><div className="flex items-center gap-2 mb-1"><span className="font-mono text-[11px] font-black bg-teal-600 text-white px-1.5 py-0.5 rounded shadow-sm">{group.id}</span><span className="text-[13px] font-bold text-gray-700 truncate max-w-[200px]">{group.name}</span></div><div className="text-[10px] text-gray-400 font-medium">規格: {group.spec || '標規'}</div></div>
                                                                <div className="text-right"><span className="text-[10px] text-gray-400 block uppercase font-bold tracking-tighter">總剩餘庫存</span><span className={`text-xl font-black ${group.total < currentNeed ? 'text-red-500 underline' : 'text-teal-600'}`}>{group.total}</span></div>
                                                            </div>
                                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 font-sans">
                                                                {group.lots.length > 0 ? group.lots.map((lot, lIdx) => (
                                                                    <div key={lIdx} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col hover:border-teal-400 transition-colors group font-sans">
                                                                                <span className="text-[9px] text-gray-400 font-bold uppercase mb-1 group-hover:text-teal-500 tracking-wider">Batch 批號</span>
                                                                                <span className="font-mono text-sm font-black text-[#c25e00] break-all leading-tight mb-2 font-sans">{Utils.formatBatch(lot.lot) || "無標註"}</span>
                                                                                <div className="mt-auto pt-2 border-t border-gray-50 flex justify-between items-end"><span className="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">剩餘數量</span><span className="font-black text-[15px] text-teal-600 font-mono leading-none">{lot.qty}</span></div>
                                                                    </div>
                                                                )) : <div className="col-span-full text-center p-3 text-xs text-gray-400 bg-gray-50 rounded-lg">此產品目前無任何有效批號庫存 (>0)</div>}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300 font-sans"><UI.Search size={44} className="mx-auto text-gray-300 mb-3"/><p className="text-sm text-gray-400 font-black uppercase tracking-widest font-sans">No Match in A06REPORT</p><p className="text-[11px] text-gray-400 mt-2 font-sans px-4">無法在數據分頁中自動匹配到： <span className="font-bold font-mono text-gray-600">"{item.name}"</span></p><p className="text-[9px] text-gray-300 mt-2 italic px-8 font-sans">已啟用【全域模糊比對】：系統已保留中文字元，並嘗試在貨號(Col A)與品名(Col C)中搜尋關鍵字。</p></div>
                                            )}
                                    </div>
                                </div>
                              );
                          })}
                        </div>
                      </section>
                      <div className="pt-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 font-sans font-bold">
                        <button onClick={() => confirm(`確定刪除訂單 #${order.orderId}？此操作不可撤回。`) && onDelete([order.orderId]) && onClose()} className="text-red-400 hover:text-red-600 text-sm font-bold flex items-center gap-1.5 px-4 py-2 hover:bg-red-50 rounded-lg transition-colors font-sans"><UI.Trash size={16}/> 刪除單據</button>
                        <button onClick={handleSave} disabled={isSavingDetails} className={`w-full sm:w-auto px-10 py-3.5 rounded-xl text-sm font-black text-white transition-all shadow-lg flex items-center justify-center gap-3 active:scale-95 ${saveSuccess ? 'bg-green-600 shadow-green-100' : 'bg-[#c25e00] hover:bg-[#a04d00] shadow-orange-100'} font-sans font-bold`}>
                            {isSavingDetails ? <UI.Loader size={20} className="animate-spin" /> : saveSuccess ? <UI.Check size={20} /> : <UI.Save size={20} />}
                            {isSavingDetails ? '正在同步數據...' : saveSuccess ? '變更已成功同步' : '儲存數量與所有變更'}
                        </button>
                      </div>
                  </ErrorBoundary>
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [password, setPassword] = useState("");
          const [orders, setOrders] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [filteredOrders, setFilteredOrders] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedIds, setSelectedIds] = useState(new Set()); 
          const [loading, setLoading] = useState(false);
          const [apiError, setApiError] = useState(null);
          const [lastUpdated, setLastUpdated] = useState("");
          const [activeTab, setActiveTab] = useState('all');
          
          const [currentView, setCurrentView] = useState('orders'); 
          const [invSearchText, setInvSearchText] = useState("");
          const [invSearchQty, setInvSearchQty] = useState("");

          // V16.0: Auto-refresh + Loading State
          const fetchAllData = useCallback(async () => {
            setLoading(true); setApiError(null);
            try {
              const res = await fetch(`${API_URL}?action=getData&t=${Date.now()}`, { redirect: 'follow' });
              const result = await res.json();
              if (result.error) throw new Error(result.error);
              setOrders(result.orders || []);
              setInventory(result.inventory || []);
              setLastUpdated(new Date().toLocaleTimeString());
            } catch (error) { console.error("Fetch Error:", error); setApiError("無法讀取雲端數據"); } 
            finally { setLoading(false); }
          }, []);

          useEffect(() => { 
              if (isLoggedIn) {
                  fetchAllData();
                  const interval = setInterval(() => {
                      fetchAllData();
                  }, 30000); 
                  return () => clearInterval(interval);
              }
          }, [isLoggedIn, fetchAllData]);

          useEffect(() => {
            let res = orders;
            if (activeTab === 'received') res = res.filter(o => !o.status);
            else if (activeTab === 'hold') res = res.filter(o => Utils.safeStr(o.orderType).includes('保留'));
            else if (activeTab === 'confirmed') res = res.filter(o => o.status === '已確認庫存');
            else if (activeTab === 'shipped') res = res.filter(o => o.status === '已排單出貨');
            if (searchTerm) {
              const t = searchTerm.toLowerCase();
              res = res.filter(o => Utils.safeStr(o.company).toLowerCase().includes(t) || Utils.safeStr(o.orderId).toLowerCase().includes(t));
            }
            setFilteredOrders(res);
          }, [searchTerm, orders, activeTab]);

          const { groupedInventory, diagnosisData } = useMemo(() => {
              const pendingItems = []; 
              orders.forEach(o => {
                  const isHold = Utils.safeStr(o.orderType).includes('保留');
                  const isShipped = o.status === '已排單出貨'; 
                  if (isHold && !isShipped) {
                      const rawItems = Utils.safeStr(o.items).split('\n').filter(l => l.trim() !== "");
                      rawItems.forEach(line => {
                          let s = Utils.safeStr(line).replace(/^(\d{1,3}[\.\s])\s*/, '').trim();
                          const match = s.match(/^(.*)[\sxX\*＊\u00d7]+([0-9,\.]+)\s*([^\d\s]*)$/);
                          let qty = 1;
                          if (match && match[1] && match[2]) {
                              qty = Utils.parseQty(match[2]);
                              s = match[1].trim(); 
                          }
                          const cleanFullLine = Utils.cleanFuzzy(s); 
                          const tokens = s.split(/[\s,]+/); 
                          const cleanTokens = tokens.map(t => Utils.cleanFuzzy(t)).filter(t => t.length > 1);
                          if (qty > 0) {
                              pendingItems.push({
                                  company: o.company,
                                  qty: qty,
                                  originalName: s, 
                                  cleanName: cleanFullLine, 
                                  cleanTokens: cleanTokens, 
                                  orderId: o.orderId,
                                  orderType: o.orderType,
                                  matched: false 
                              });
                          }
                      });
                  }
              });

              const searchTerms = invSearchText.toLowerCase().split(/\s+/).filter(t => t.length > 0);
              const minQty = parseFloat(invSearchQty);
              const hasMinQty = !isNaN(minQty);
              const hasSearch = searchTerms.length > 0 || hasMinQty;

              const allGroups = inventory.reduce((acc, curr) => {
                  const qty = Utils.parseQty(curr.qty);
                  const key = `${curr.id}_${curr.name}`;
                  if (!acc[key]) {
                      const cleanId = Utils.cleanFuzzy(curr.id);     
                      const cleanName = Utils.cleanFuzzy(curr.name); 
                      let totalRes = 0;
                      let detailsRes = [];
                      pendingItems.forEach(pItem => {
                          const pClean = pItem.cleanName; 
                          const reverseIDMatch = cleanId.length > 1 && pClean.includes(cleanId);
                          const reverseNameMatch = cleanName.length > 1 && pClean.includes(cleanName);
                          const normalMatch = (cleanId.length > 1 && cleanId.includes(pClean));
                          const tokenMatch = pItem.cleanTokens.some(t => t === cleanId);
                          if (reverseIDMatch || reverseNameMatch || normalMatch || tokenMatch) {
                              totalRes += pItem.qty;
                              detailsRes.push(pItem);
                              pItem.matched = true; 
                          }
                      });
                      acc[key] = {
                          id: curr.id,
                          name: curr.name,
                          spec: curr.spec,
                          packing: curr.packing,
                          usage: curr.usage,
                          totalQty: 0,
                          reservedQty: totalRes, 
                          reserveDetails: detailsRes, 
                          batches: []
                      };
                  }
                  acc[key].totalQty += qty;
                  if (qty > 0) acc[key].batches.push({ lot: Utils.formatBatch(curr.lot), qty: qty });
                  return acc;
              }, {});

              const results = Object.values(allGroups).filter(group => {
                  // V16.0: Hide 0 stock items in main inventory list
                  if (group.totalQty <= 0) return false;

                  if (!hasSearch) return false; 
                  let matchText = true;
                  let matchQty = true;
                  if (searchTerms.length > 0) {
                      matchText = searchTerms.every(term => {
                          const cId = Utils.cleanFuzzy(group.id);
                          const cName = Utils.cleanFuzzy(group.name);
                          const inId = cId.includes(term);
                          const inName = cName.includes(term);
                          const inBatch = group.batches.some(b => Utils.cleanFuzzy(b.lot).includes(term));
                          return inId || inName || inBatch;
                      });
                  }
                  if (hasMinQty) {
                      matchQty = (group.totalQty - group.reservedQty) >= minQty;
                  }
                  return matchText && matchQty;
              });

              return { 
                  groupedInventory: results.sort((a, b) => b.totalQty - a.totalQty), 
                  diagnosisData: pendingItems 
              };
          }, [inventory, orders, invSearchText, invSearchQty]);

          const sendCommand = async (p) => { 
              try { 
                  await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ payload: JSON.stringify(p) }) }); 
                  return true; 
              } catch (e) { 
                  return false; 
              } 
          };

          const handleUpdateDetails = async (id, details) => {
              const ok = await sendCommand({ action: 'updateDetails', orderId: id, ...details });
              if (ok) {
                  setOrders(prev => prev.map(o => o.orderId === id ? { ...o, ...details } : o));
                  return true;
              }
              return false;
          };

          const handleStatusUpdate = async (ids, status) => {
              const targetIds = ids || Array.from(selectedIds);
              const action = status === 'delete' ? 'delete' : 'updateStatus';
              if (status === 'delete') {
                  setOrders(prev => prev.filter(o => !targetIds.includes(o.orderId)));
                  if (selectedOrder && targetIds.includes(selectedOrder.orderId)) setSelectedOrder(null);
              } else {
                  setOrders(prev => prev.map(o => targetIds.includes(o.orderId) ? { ...o, status } : o));
                  if (selectedOrder && targetIds.includes(selectedOrder.orderId)) setSelectedOrder(p => p ? ({ ...p, status }) : null);
              }
              setSelectedIds(new Set());
              const success = await sendCommand({ action, status, ids: targetIds });
              if (!success) {
                  fetchAllData();
                  alert("操作失敗，請檢查網路連線");
              }
          };

          if (!isLoggedIn) {
            return (
              <div className="fixed inset-0 bg-[#111] flex items-center justify-center p-4 z-50">
                <div className="w-full max-w-sm bg-white/5 p-10 rounded-[2rem] border border-white/10 shadow-2xl text-center font-sans font-bold">
                  <h1 className="text-3xl font-black text-white tracking-[0.2em] mb-10 font-sans">TILE PARK</h1>
                  <form onSubmit={(e) => { e.preventDefault(); if(password==='8888') setIsLoggedIn(true); }} className="space-y-6">
                    <input type="password" placeholder="PASSWORD" className="w-full px-6 py-4 bg-black/40 border border-white/10 rounded-2xl text-white text-center tracking-[1em] focus:border-orange-500 outline-none transition-all font-mono" value={password} onChange={e=>setPassword(e.target.value)} autoFocus />
                    <button type="submit" className="w-full bg-[#c25e00] text-white py-4 rounded-2xl font-black tracking-widest hover:bg-orange-600 transition-all uppercase font-bold shadow-lg">登入</button>
                  </form>
                </div>
              </div>
            );
          }

          // V16.0: Urgent Logic
          const isUrgent = (order) => {
              if (!Utils.safeStr(order.orderType).includes('保留')) return false;
              if (!order.deliveryDate) return false;
              const delivery = new Date(order.deliveryDate);
              const today = new Date();
              today.setHours(0,0,0,0); 
              const limit = new Date();
              limit.setDate(today.getDate() + 30);
              if (isNaN(delivery.getTime())) return false;
              return delivery <= limit;
          };

          const tabs = [
              { id: 'all', label: '全部', count: orders.length },
              { id: 'received', label: '待處理', count: orders.filter(o => !o.status).length },
              { id: 'hold', label: '保留單', count: orders.filter(o => Utils.safeStr(o.orderType).includes('保留')).length },
              { id: 'confirmed', label: '已確認', count: orders.filter(o => o.status === '已確認庫存').length },
              { id: 'shipped', label: '已出貨', count: orders.filter(o => o.status === '已排單出貨').length },
          ];

          return (
            <div className="fixed inset-0 flex flex-col md:flex-row font-sans overflow-hidden bg-gray-100">
              <aside className="hidden md:flex w-64 bg-[#1a1a1a] text-white flex-col p-6 shrink-0 h-full">
                <div className="mb-10 font-black text-xl">TILE PARK <span className="block text-[10px] text-orange-500">Warehouse V16.4</span></div>
                <nav className="flex flex-col gap-2">
                    <button onClick={() => setCurrentView('orders')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'orders' ? 'bg-orange-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.File size={18} /> 訂單管理</button>
                    <button onClick={() => {setCurrentView('inventory'); setInvSearchText(""); setInvSearchQty("");}} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'inventory' ? 'bg-teal-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.Box size={18} /> 庫存查詢</button>
                    <button onClick={() => setCurrentView('diagnosis')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm ${currentView === 'diagnosis' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-white/10'}`}><UI.Bug size={18} /> 系統診斷</button>
                </nav>
                <div className="mt-auto text-[10px] text-gray-500 text-center flex flex-col gap-1">
                    <span>{lastUpdated}</span>
                    <span className="text-[9px] text-gray-600 flex items-center justify-center gap-1"><UI.Clock size={10}/> 30秒自動更新</span>
                </div>
              </aside>

              <div className="md:hidden bg-[#1a1a1a] flex flex-col shrink-0 z-50">
                  <div className="p-3 flex justify-between items-center">
                      <span className="font-black text-white text-lg">TILE PARK <span className="text-[10px] text-orange-500">V16.4</span></span>
                      <span className="text-[10px] text-gray-500">{lastUpdated}</span>
                  </div>
                  <div className="grid grid-cols-3 bg-[#2a2a2a] text-gray-400 text-sm font-bold">
                      <button onClick={() => setCurrentView('orders')} className={`py-3 flex justify-center items-center gap-2 ${currentView==='orders'?'bg-orange-600 text-white':'hover:bg-[#333]'}`}><UI.File size={16}/> 訂單</button>
                      <button onClick={() => setCurrentView('inventory')} className={`py-3 flex justify-center items-center gap-2 ${currentView==='inventory'?'bg-teal-600 text-white':'hover:bg-[#333]'}`}><UI.Box size={16}/> 庫存</button>
                      <button onClick={() => setCurrentView('diagnosis')} className={`py-3 flex justify-center items-center gap-2 ${currentView==='diagnosis'?'bg-red-600 text-white':'hover:bg-[#333]'}`}><UI.Bug size={16}/> 診斷</button>
                  </div>
              </div>

              <main className="flex-1 flex flex-col min-h-0 relative bg-gray-100">
                {currentView === 'orders' && (
                    <div className="flex flex-col h-full">
                        <header className="flex justify-between items-center p-4 bg-white border-b shadow-sm flex-none">
                            <h2 className="text-xl font-bold text-gray-800">訂單管理</h2>
                            <button onClick={fetchAllData} disabled={loading} className={`p-2 rounded border transition-all ${loading ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white hover:bg-gray-50 text-gray-700 active:scale-95'}`}><UI.Refresh className={loading ? 'animate-spin-fast' : ''}/></button>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar pb-24 min-h-0">
                            <div className="flex gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
                                {tabs.map(tab => (
                                    <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setSelectedIds(new Set())}} className={`px-4 py-2 rounded-xl text-xs font-bold border whitespace-nowrap ${activeTab===tab.id?'bg-orange-600 text-white':'bg-white text-gray-600'}`}>
                                        {tab.label} <span className="ml-1 opacity-80">({tab.count})</span>
                                    </button>
                                ))}
                            </div>
                            <div className="bg-white rounded-xl shadow overflow-hidden">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50 text-gray-500 font-bold border-b"><tr><th className="p-3 w-10"></th><th className="p-3">單號</th><th className="p-3">狀態</th><th className="p-3">客戶</th><th className="p-3">類型</th><th className="p-3">明細</th></tr></thead>
                                    <tbody className="divide-y">{filteredOrders.map(o=>(<tr key={o.orderId} onClick={()=>setSelectedOrder(o)} className="hover:bg-gray-50 cursor-pointer"><td className="p-3" onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.has(o.orderId)} onChange={()=>{const n=new Set(selectedIds);n.has(o.orderId)?n.delete(o.orderId):n.add(o.orderId);setSelectedIds(n)}}/></td><td className="p-3 font-mono font-bold">{o.orderId}</td><td className="p-3"><StatusBadge status={o.status}/></td><td className="p-3 font-bold">{o.company}</td>
                                    <td className="p-3 text-xs text-gray-500">
                                        {o.orderType}
                                        {isUrgent(o) && (
                                            <span className="ml-2 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-red-100 text-red-600 border border-red-200">
                                                <UI.Clock size={10} className="mr-1"/> 近期交貨
                                            </span>
                                        )}
                                    </td>
                                    <td className="p-3"><button className="text-xs border px-2 py-1 rounded">查看</button></td></tr>))}</tbody>
                                </table>
                            </div>
                        </div>
                        {selectedIds.size>0 && <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-full shadow-xl flex gap-4 border z-20"><span className="font-bold">{selectedIds.size} selected</span><button onClick={()=>handleStatusUpdate(null,'已確認庫存')} className="text-teal-600 font-bold">確認庫存</button><button onClick={()=>handleStatusUpdate(null,'已排單出貨')} className="text-blue-600 font-bold">排單出貨</button></div>}
                    </div>
                )}

                {currentView === 'inventory' && (
                    <div className="flex flex-col h-full">
                        <header className="bg-white border-b p-4 shadow-sm flex-none z-10">
                            <div className="flex gap-4 max-w-3xl">
                                <div className="relative flex-1"><UI.Search className="absolute left-3 top-3 text-gray-400"/><input type="text" placeholder="搜尋品名/貨號..." className="w-full pl-10 p-2.5 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" value={invSearchText} onChange={e=>setInvSearchText(e.target.value)} autoFocus/></div>
                                <div className="relative w-24 md:w-32"><UI.Filter className="absolute left-3 top-3 text-gray-400"/><input type="number" placeholder="數量..." className="w-full pl-10 p-2.5 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" value={invSearchQty} onChange={e=>setInvSearchQty(e.target.value)}/></div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 bg-gray-50 custom-scrollbar pb-24 min-h-0">
                            {groupedInventory.length === 0 ? (
                                <div className="text-center py-20 text-gray-400"><UI.Box size={48} className="mx-auto mb-4 opacity-20"/><p>無符合資料</p></div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
                                    {groupedInventory.map((item, idx) => (
                                        <div key={idx} className={`bg-white rounded-xl shadow-sm border overflow-hidden ${item.reservedQty>0?'border-orange-300 ring-1 ring-orange-100':''}`}>
                                            <div className="p-4 border-b bg-gray-50/50 flex justify-between items-start">
                                                <div>
                                                    <span className="bg-teal-100 text-teal-800 text-[10px] px-2 py-1 rounded font-mono font-bold">{item.id}</span>
                                                    <h3 className="font-bold text-lg mt-1 break-words">{item.name}</h3>
                                                    <div className="text-[10px] text-gray-500 mt-1 space-x-2"><span>規:{item.spec}</span><span>包:{item.packing}</span><span>用:{item.usage}</span></div>
                                                </div>
                                                <div className="text-right shrink-0 ml-2"><span className="text-xs text-gray-400 font-bold block">TOTAL</span><span className="text-2xl font-black text-teal-600">{item.totalQty.toLocaleString()}</span></div>
                                            </div>
                                            <div className="p-3 bg-white flex justify-between items-center border-b">
                                                <div className="flex flex-col"><span className="text-[10px] text-gray-400 font-bold">RESERVED</span><span className={`font-mono font-bold ${item.reservedQty>0?'text-orange-600':'text-gray-300'}`}>{item.reservedQty>0?`-${item.reservedQty}`:'0'}</span></div>
                                                <div className="flex flex-col text-right"><span className="text-[10px] text-gray-400 font-bold">AVAILABLE</span><span className="font-mono text-xl font-black text-gray-800">{(item.totalQty-item.reservedQty).toLocaleString()}</span></div>
                                            </div>
                                            {item.reservedQty > 0 && (
                                                <div className="bg-orange-50 p-3 border-b border-orange-100 space-y-1">
                                                    <div className="text-[10px] font-bold text-orange-400 flex items-center gap-1"><UI.Lock size={10}/> 保留明細</div>
                                                    {item.reserveDetails.map((det, dIdx)=>(
                                                        <div key={dIdx} className="flex justify-between text-xs text-orange-900"><span>{det.company} ({det.orderId})</span><span className="font-mono font-bold">{det.qty}</span></div>
                                                    ))}
                                                </div>
                                            )}
                                            <div className="p-3 bg-gray-50 space-y-1 max-h-32 overflow-y-auto custom-scrollbar">
                                                {item.batches.map((b, bi)=>(<div key={bi} className="flex justify-between text-xs text-gray-600 border-b border-gray-100 last:border-0 pb-1">
                                                    <span className="font-mono font-bold">{b.lot||'No Batch'}</span>
                                                    <span className="font-mono">{b.qty}</span>
                                                </div>))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {currentView === 'diagnosis' && (
                    <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-100 pb-24 min-h-0">
                        <h2 className="text-xl md:text-2xl font-black text-gray-800 mb-6 flex items-center gap-2"><UI.Bug className="text-red-500"/> 系統保留單診斷器</h2>
                        <div className="flex justify-end mb-4"><button onClick={fetchAllData} disabled={loading} className={`p-2 rounded border bg-white shadow-sm flex items-center gap-2 font-bold text-sm ${loading ? 'text-gray-400 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-50 active:scale-95'}`}><UI.Refresh className={loading ? 'animate-spin-fast' : ''}/> 重新整理數據</button></div>
                        <div className="space-y-2">
                            {diagnosisData.length === 0 ? (
                                <div className="text-center p-10 text-gray-400 font-bold">目前沒有偵測到任何保留單</div>
                            ) : (
                                diagnosisData.map((item, idx) => (
                                    <div key={idx} className={`p-4 rounded-lg border flex flex-col md:flex-row justify-between gap-4 ${item.matched ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                        <div className="flex-1 space-y-1">
                                            <div className="flex items-center gap-2">
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded text-white ${item.matched ? 'bg-green-600' : 'bg-red-600'}`}>
                                                    {item.matched ? 'MATCHED' : 'UNMATCHED'}
                                                </span>
                                                <span className="font-mono font-bold text-gray-700">#{item.orderId}</span>
                                                <span className="text-xs text-gray-500">({item.company})</span>
                                            </div>
                                            <div className="font-bold text-gray-800">{item.originalName}</div>
                                            <div className="font-mono text-xs text-gray-400 break-all">全句清洗: {item.cleanName}</div>
                                        </div>
                                        <div className="text-right md:w-32 flex flex-col justify-center">
                                            <span className="text-xs text-gray-400 font-bold">數量 QTY</span>
                                            <span className="text-2xl font-black text-gray-800">{item.qty}</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                )}
              </main>

              {selectedOrder && <OrderDetailModal order={selectedOrder} inventory={inventory} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleStatusUpdate} onUpdateDetails={handleUpdateDetails} onDelete={ids => handleStatusUpdate(ids, 'delete')} isProcessing={loading} />}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
