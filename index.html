<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Park Admin System - Inventory & Lot Control</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // 🛑 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyKP7YGKdSFYYJMEI2tH7t3u3lILjfc3XGK-xlFx0o3se2_QnnvP-vNtEGcgZXt1Xx7/exec";

        // --- 🛠️ 內建圖示 ---
        const Icon = ({ path, size = 18, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {path}
          </svg>
        );

        const Icons = {
          Search: (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />,
          RefreshCw: (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />,
          Package: (p) => <Icon {...p} path={<><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></>} />,
          Clock: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
          FileText: (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>} />,
          X: (p) => <Icon {...p} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
          Trash2: (p) => <Icon {...p} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
          CheckCircle: (p) => <Icon {...p} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
          Truck: (p) => <Icon {...p} path={<><rect x="1" y="3" width="15" height="13" rx="2" ry="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>} />,
          Loader: (p) => <Icon {...p} path={<><path d="M21 12a9 9 0 1 1-6.219-8.56" /></>} />,
          Copy: (p) => <Icon {...p} path={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />,
          Archive: (p) => <Icon {...p} path={<><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></>} />,
          Database: (p) => <Icon {...p} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />,
          Hash: (p) => <Icon {...p} path={<><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>} />,
          Save: (p) => <Icon {...p} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />
        };

        // --- 子組件 ---

        const StatusBadge = ({ status }) => {
          let colorClass = "bg-green-100 text-green-800 border-green-200";
          if (status === '已確認庫存') colorClass = "bg-teal-100 text-teal-800 border-teal-200";
          if (status === '已排單出貨') colorClass = "bg-blue-100 text-blue-800 border-blue-200";

          return (
            <span className={`px-2 py-1 rounded-full text-[10px] md:text-xs font-bold border ${colorClass} whitespace-nowrap`}>
              {status || '已接收'}
            </span>
          );
        };

        const ReservationBadge = () => (
            <span className="flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-200 ml-2 whitespace-nowrap">
              <Icons.Archive size={10} /> 保留庫存
            </span>
        );

        // --- 核心組件：訂單詳情 ---
        const OrderDetailModal = ({ order, inventory, onClose, onUpdateStatus, onUpdateDetails, onDelete, isProcessing }) => {
          if (!order) return null;

          const [copied, setCopied] = useState(false);
          const [internalNote, setInternalNote] = useState(order.internalNote || '');
          const [factoryEta, setFactoryEta] = useState(order.factoryEta || '');
          const [deliveryDate, setDeliveryDate] = useState(order.deliveryDate ? order.deliveryDate.split('T')[0] : '');
          const [isSavingDetails, setIsSavingDetails] = useState(false);
          const [saveSuccess, setSaveSuccess] = useState(false);
          
          // 解析訂單商品，加入防錯
          const [editableItems, setEditableItems] = useState(() => {
              const items = Array.isArray(order.parsedItems) ? order.parsedItems : [];
              return items.map(itemStr => {
                  if (typeof itemStr !== 'string') return { name: String(itemStr), qty: '1', note: '' };
                  const regex = /^(.*)\s*[xX*]\s*([^()]+)(?:\s*\((.*)\))?$/;
                  const match = itemStr.match(regex);
                  if (match) {
                      return { name: match[1].trim(), qty: match[2].trim(), note: match[3] || '' };
                  }
                  return { name: itemStr, qty: '1', note: '' };
              });
          });

          const isStockConfirmed = order.status === '已確認庫存' || order.status === '已排單出貨';
          const isShipped = order.status === '已排單出貨';
          const isReservation = order.isReservation;

          // 庫存匹配邏輯：強制轉字串避免崩潰
          const getStockInfo = (productName) => {
              if (!Array.isArray(inventory) || inventory.length === 0) return { total: 0, lots: [] };
              const searchName = String(productName || "").toLowerCase();
              const matches = inventory.filter(inv => {
                const invName = String(inv.name || "").toLowerCase();
                return invName.includes(searchName);
              });
              const total = matches.reduce((sum, item) => sum + (parseFloat(item.qty) || 0), 0);
              return { total, lots: matches };
          };

          const handleUpdateItemQty = (index, value) => {
              const updated = [...editableItems];
              updated[index].qty = value;
              setEditableItems(updated);
          };

          const handleSaveDetails = async () => {
              setIsSavingDetails(true);
              setSaveSuccess(false);
              const itemsString = editableItems.map(i => `${i.name} x ${i.qty} ${i.note ? `(${i.note})` : ''}`).join('\n');
              const success = await onUpdateDetails(order.orderId, { 
                  internalNote, factoryEta, deliveryDate, items: itemsString 
              });
              setIsSavingDetails(false);
              if (success) {
                  setSaveSuccess(true);
                  setTimeout(() => setSaveSuccess(false), 3000);
              }
          };

          const handleCopy = () => {
              const itemsText = editableItems.map(i => `・${i.name} x ${i.qty}`).join('\n');
              const text = `【TILE PARK 訂單確認】\n單號：${order.orderId}\n客戶：${order.company}\n日期：${deliveryDate}\n\n內容：\n${itemsText}\n\n狀態：${order.status}`;
              const textArea = document.createElement("textarea");
              textArea.value = text;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand('copy');
              document.body.removeChild(textArea);
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
          };

          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in font-sans">
              <div className="bg-white w-full max-w-4xl rounded-lg shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
                
                <div className={`${isReservation ? 'bg-blue-600' : 'bg-[#222]'} text-white p-4 flex justify-between items-center shrink-0`}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                        <p className="text-xs text-white/70 font-mono tracking-widest">ORDER MANAGEMENT</p>
                        {isReservation && <span className="bg-white/20 px-2 py-0.5 rounded text-[10px] font-bold">已保留庫存</span>}
                    </div>
                    <h2 className="text-xl font-bold font-mono truncate">#{order.orderId}</h2>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={handleCopy} className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold transition-all ${copied ? 'bg-green-500' : 'bg-white/10 hover:bg-white/20'}`}>
                        {copied ? '已複製' : '複製摘要'}
                    </button>
                    <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-colors"><Icons.X size={24} /></button>
                  </div>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar bg-gray-50/50">
                  {/* 狀態追蹤 */}
                  <div className="bg-white border border-gray-200 rounded-xl p-5 mb-6 shadow-sm flex flex-col sm:flex-row gap-6">
                        <label className={`flex-1 flex items-center gap-4 cursor-pointer select-none transition-all ${isProcessing ? 'opacity-50' : ''}`}>
                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center border-2 transition-all ${isStockConfirmed ? 'bg-teal-500 border-teal-500 shadow-teal-100' : 'bg-white border-gray-200 shadow-sm'}`}>
                                {isStockConfirmed ? <Icons.Check size={24} className="text-white" /> : <Icons.Database size={20} className="text-gray-300" />}
                            </div>
                            <div>
                                <span className={`block font-bold ${isStockConfirmed ? 'text-teal-700' : 'text-gray-700'}`}>已確認庫存批號</span>
                                <span className="text-xs text-gray-400">核對現場貨物與色號</span>
                            </div>
                            <input type="checkbox" className="hidden" checked={isStockConfirmed} onChange={() => !isStockConfirmed && onUpdateStatus([order.orderId], '已確認庫存')} disabled={isProcessing || isStockConfirmed} />
                        </label>
                        <div className="hidden sm:block w-px bg-gray-100 h-12"></div>
                        <label className={`flex-1 flex items-center gap-4 cursor-pointer select-none transition-all ${isProcessing ? 'opacity-50' : ''}`}>
                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center border-2 transition-all ${isShipped ? 'bg-blue-500 border-blue-500 shadow-blue-100' : 'bg-white border-gray-200 shadow-sm'}`}>
                                {isShipped ? <Icons.Check size={24} className="text-white" /> : <Icons.Truck size={20} className="text-gray-300" />}
                            </div>
                            <div>
                                <span className={`block font-bold ${isShipped ? 'text-blue-700' : 'text-gray-700'}`}>已排單出貨</span>
                                <span className="text-xs text-gray-400">已進入物流派送程序</span>
                            </div>
                            <input type="checkbox" className="hidden" checked={isShipped} onChange={() => !isShipped && onUpdateStatus([order.orderId], '已排單出貨')} disabled={isProcessing || isShipped} />
                        </label>
                  </div>

                  {/* 明細區域 */}
                  <section className="mb-8">
                    <h3 className={`text-xs font-black uppercase tracking-[0.2em] mb-4 flex items-center justify-between ${isReservation ? 'text-blue-600' : 'text-[#c25e00]'}`}>
                        <span>訂購明細與即時庫存狀況</span>
                        <span className="text-gray-400 font-normal">單位：(箱/才/片)</span>
                    </h3>
                    
                    <div className="space-y-4">
                      {editableItems.map((item, idx) => {
                          const stock = getStockInfo(item.name);
                          const currentQty = parseFloat(item.qty) || 0;
                          const isShortage = currentQty > stock.total;
                          
                          return (
                            <div key={idx} className={`bg-white border rounded-xl overflow-hidden shadow-sm transition-all hover:border-gray-300 ${isShortage ? 'ring-2 ring-red-100 border-red-200' : ''}`}>
                                <div className="p-4 flex flex-col md:flex-row gap-5">
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-start justify-between mb-3">
                                            <div className="font-bold text-gray-800 leading-tight break-words">{item.name}</div>
                                            {isShortage && <span className="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded animate-pulse shrink-0 ml-2">庫存不足</span>}
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="relative">
                                                <input 
                                                    type="number" 
                                                    value={item.qty} 
                                                    onChange={(e) => handleUpdateItemQty(idx, e.target.value)}
                                                    className={`w-28 p-2.5 border rounded-lg font-black text-lg text-center outline-none transition-all ${isShortage ? 'bg-red-50 border-red-300 text-red-600' : 'bg-gray-50 border-gray-200 text-[#c25e00] focus:ring-2 focus:ring-orange-200'}`}
                                                />
                                                <span className="absolute -top-2 left-2 bg-white px-1 text-[10px] font-bold text-gray-400 border border-gray-100 rounded whitespace-nowrap">數量修改</span>
                                            </div>
                                            <div className="flex flex-col min-w-0">
                                                <span className="text-xs text-gray-500 font-medium truncate">備註: {item.note || '無'}</span>
                                                <span className="text-[11px] text-gray-400">修改將同步至雲端</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="md:w-72 shrink-0 bg-gray-50/80 rounded-xl p-4 border border-gray-100">
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="flex items-center gap-1.5 text-xs font-bold text-gray-500">
                                                <Icons.Database size={14} /> 倉庫總庫存
                                            </div>
                                            <div className={`text-base font-black ${isShortage ? 'text-red-500' : 'text-teal-600'}`}>
                                                {stock.total}
                                            </div>
                                        </div>
                                        <div className="space-y-1.5 max-h-32 overflow-y-auto custom-scrollbar pr-1">
                                            {stock.lots.length > 0 ? stock.lots.map((lot, lIdx) => (
                                                <div key={lIdx} className="flex justify-between items-center text-[11px] py-1.5 border-b border-gray-100 last:border-0">
                                                    <span className="font-mono text-gray-600 flex items-center gap-1 truncate mr-2">
                                                        <Icons.Hash size={10} className="text-gray-400" /> {lot.lot || '未知'}
                                                    </span>
                                                    <span className="font-bold text-gray-800 bg-white px-2 py-0.5 rounded border border-gray-200 min-w-[30px] text-center shrink-0">
                                                        {lot.qty}
                                                    </span>
                                                </div>
                                            )) : (
                                                <div className="text-[10px] text-gray-400 italic text-center py-4 bg-white/50 rounded-lg">查無資料</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                          );
                      })}
                    </div>
                  </section>

                  {/* 基礎資訊 */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <section className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                      <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <Icons.Search size={14}/> 客戶資訊
                      </h4>
                      <div className="space-y-3 text-sm">
                        <p className="flex justify-between gap-4"><span className="text-gray-400 shrink-0">公司:</span> <span className="font-bold text-right">{order.company}</span></p>
                        <p className="flex justify-between gap-4"><span className="text-gray-400 shrink-0">聯絡人:</span> <span className="text-right">{order.contact}</span></p>
                        <p className="flex justify-between gap-4"><span className="text-gray-400 shrink-0">電話:</span> <a href={`tel:${order.phone}`} className="text-blue-600 font-mono font-bold underline text-right">{order.phone}</a></p>
                      </div>
                    </section>
                    <section className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                      <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <Icons.Truck size={14}/> 出貨資訊
                      </h4>
                      <div className="space-y-3 text-sm">
                        <div className="flex justify-between items-center gap-4">
                            <span className="text-gray-400 shrink-0">日期:</span> 
                            <input type="date" value={deliveryDate} onChange={e => setDeliveryDate(e.target.value)} className="font-bold border-b-2 border-orange-100 focus:border-orange-500 outline-none bg-transparent py-1 px-2 text-right w-full max-w-[150px]" />
                        </div>
                        <p className="flex justify-between gap-4"><span className="text-gray-400 shrink-0">時段:</span> <span className="font-bold text-right">{order.deliveryTime}</span></p>
                        <p className="flex justify-between gap-4"><span className="text-gray-400 shrink-0">地址:</span> <span className="text-right ml-4 break-words">{order.address}</span></p>
                      </div>
                    </section>
                  </div>

                  {/* 內部區域 */}
                  <div className="bg-amber-50/50 border border-amber-200 rounded-xl p-5 mb-8">
                    <h3 className="text-sm font-black text-amber-800 mb-4 flex items-center gap-2"><Icons.Save size={18}/> 內部備忘錄</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div className="relative">
                            <label className="text-[10px] font-bold text-amber-700 uppercase mb-1.5 block">工廠 ETA</label>
                            <input type="date" value={factoryEta} onChange={e => setFactoryEta(e.target.value)} className="w-full p-2.5 border border-amber-200 rounded-lg text-sm bg-white shadow-sm" />
                        </div>
                        <div className="md:col-span-2">
                            <label className="text-[10px] font-bold text-amber-700 uppercase mb-1.5 block">內部筆記</label>
                            <textarea value={internalNote} onChange={e => setInternalNote(e.target.value)} className="w-full p-3 border border-amber-200 rounded-xl text-sm h-24 bg-white shadow-sm resize-none" placeholder="輸入內部資訊..." />
                        </div>
                    </div>
                  </div>

                  <div className="pt-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <button onClick={() => { if (confirm(`確定刪除 #${order.orderId}?`)) { onDelete([order.orderId]); onClose(); } }} className="text-red-400 hover:text-red-600 text-sm font-bold flex items-center gap-1.5 px-4 py-2 hover:bg-red-50 rounded-lg transition-all"><Icons.Trash2 size={16}/> 刪除單據</button>
                    <button 
                        onClick={handleSaveDetails} 
                        disabled={isSavingDetails} 
                        className={`w-full sm:w-auto px-10 py-3.5 rounded-xl text-sm font-black text-white transition-all shadow-lg flex items-center justify-center gap-3 active:scale-95 ${saveSuccess ? 'bg-green-600' : 'bg-[#c25e00] hover:bg-[#a04d00]'}`}
                    >
                        {isSavingDetails ? <Icons.Loader size={18} className="animate-spin" /> : saveSuccess ? <Icons.Check size={18} /> : <Icons.Save size={18} />}
                        {isSavingDetails ? '儲存中...' : saveSuccess ? '儲存成功' : '確認變更並儲存'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- 主程式邏輯 ---

        function AdminDashboard() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [password, setPassword] = useState("");
          const [orders, setOrders] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [filteredOrders, setFilteredOrders] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedIds, setSelectedIds] = useState(new Set()); 
          const [loading, setLoading] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);
          const [lastUpdated, setLastUpdated] = useState("");
          const [filterStatus, setFilterStatus] = useState('all');

          const fetchAllData = useCallback(async () => {
            setLoading(true);
            try {
              const timestamp = Date.now();
              const response = await fetch(`${API_URL}?t=${timestamp}`, { method: 'GET', cache: 'no-store' });
              const result = await response.json();
              
              // 強制校驗格式，避免崩潰
              const rawOrders = Array.isArray(result.orders) ? result.orders : (Array.isArray(result) ? result : []);
              
              const processedOrders = rawOrders.map(item => ({
                ...item,
                parsedItems: item.items ? String(item.items).split('\n') : [],
                status: item.status || '已接收',
                isReservation: String(item.orderType || '').includes('保留庫存')
              }));
              
              setOrders(processedOrders);
              if (Array.isArray(result.inventory)) setInventory(result.inventory);
              setLastUpdated(new Date().toLocaleTimeString());
            } catch (error) {
              console.error("Fetch Error:", error);
            } finally {
              setLoading(false);
            }
          }, []);

          useEffect(() => {
            if (isLoggedIn) fetchAllData();
          }, [isLoggedIn, fetchAllData]);

          useEffect(() => {
            let res = orders;
            if (filterStatus === 'reserved') res = res.filter(o => o.isReservation);
            else if (filterStatus === 'shipped') res = res.filter(o => o.status === '已排單出貨');
            else if (filterStatus === 'normal') res = res.filter(o => !o.isReservation && o.status !== '已排單出貨');

            if (searchTerm) {
              const t = searchTerm.toLowerCase();
              res = res.filter(o => String(o.company || '').toLowerCase().includes(t) || String(o.orderId || '').toLowerCase().includes(t));
            }
            setFilteredOrders(res);
          }, [searchTerm, orders, filterStatus]);

          const sendCommand = async (p) => {
            setIsProcessing(true);
            try {
                const fd = new URLSearchParams();
                fd.append('payload', JSON.stringify(p));
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: fd });
                return true;
            } catch (err) { return false; } finally { setIsProcessing(false); }
          };

          const handleUpdateDetails = async (id, details) => {
            const ok = await sendCommand({ action: 'updateDetails', orderId: id, ...details });
            if (ok) {
                setOrders(prev => prev.map(o => o.orderId === id ? { ...o, ...details, parsedItems: details.items ? details.items.split('\n') : o.parsedItems } : o));
                setTimeout(fetchAllData, 1500);
                return true;
            }
            return false;
          };

          const handleStatusUpdate = async (ids, status) => {
            const targetIds = ids || Array.from(selectedIds);
            const ok = await sendCommand({ action: 'updateStatus', status, ids: targetIds });
            if (ok) {
                setOrders(prev => prev.map(o => targetIds.includes(o.orderId) ? { ...o, status } : o));
                setSelectedIds(new Set());
                if (selectedOrder && targetIds.includes(selectedOrder.orderId)) {
                    setSelectedOrder(prev => prev ? ({ ...prev, status }) : null);
                }
                setTimeout(fetchAllData, 1500);
            }
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#222] flex flex-col items-center justify-center p-4">
                <div className="w-full max-w-sm bg-white/5 p-8 rounded-3xl backdrop-blur-xl border border-white/10 shadow-2xl">
                  <h1 className="text-3xl font-black text-white tracking-[0.2em] text-center mb-8">TILE PARK</h1>
                  <form onSubmit={(e) => { e.preventDefault(); if(password==='8888') setIsLoggedIn(true); }} className="space-y-6">
                    <input type="password" placeholder="PASSWORD" className="w-full px-6 py-4 bg-black/20 border border-white/10 rounded-2xl text-white text-center tracking-[1em] focus:border-[#c25e00] outline-none transition-all" value={password} onChange={e=>setPassword(e.target.value)} autoFocus />
                    <button type="submit" className="w-full bg-[#c25e00] text-white py-4 rounded-2xl font-black tracking-widest hover:bg-[#a04d00] transition-all">LOGIN</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="h-screen w-full bg-gray-100 font-sans flex flex-col md:flex-row overflow-hidden">
              <aside className="bg-[#1a1a1a] text-white flex-shrink-0 md:w-64 flex flex-col">
                <div className="p-6 border-b border-white/5">
                  <div className="font-black text-xl tracking-tighter">TILE PARK</div>
                  <div className="text-[10px] text-orange-500 font-mono">INVENTORY MANAGEMENT</div>
                </div>
                <nav className="p-4 flex-1">
                  <button className="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-[#c25e00] text-white font-bold text-sm">
                    <Icons.FileText size={18} /> 訂單與庫存
                  </button>
                </nav>
                <div className="p-4 border-t border-white/5 text-[10px] text-gray-500 font-mono text-center">Sync: {lastUpdated}</div>
              </aside>

              <main className="flex-1 flex flex-col min-h-0 relative">
                <header className="bg-white border-b p-5 flex flex-col gap-4">
                  <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                      <h2 className="text-xl font-black text-gray-800">訂單總覽</h2>
                      <div className="flex w-full sm:w-auto gap-2">
                        <div className="relative flex-1 sm:w-80">
                          <Icons.Search className="absolute left-3 top-3 text-gray-400" size={16} />
                          <input type="text" placeholder="搜尋..." className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border rounded-xl text-sm outline-none focus:border-orange-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                        </div>
                        <button onClick={fetchAllData} className={`p-2.5 bg-white border rounded-xl transition-all ${loading ? 'animate-spin text-orange-500 border-orange-200' : 'text-gray-500'}`}><Icons.RefreshCw size={20}/></button>
                      </div>
                  </div>
                  <div className="flex gap-2 overflow-x-auto no-scrollbar">
                    {['all', 'normal', 'reserved', 'shipped'].map(s => (
                      <button key={s} onClick={()=>setFilterStatus(s)} className={`px-5 py-2 rounded-full text-xs font-black whitespace-nowrap transition-all border ${filterStatus===s ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-400 border-gray-200 hover:border-gray-300'}`}>
                        {s==='all' && '全部'} {s==='normal' && '待處理'} {s==='reserved' && '保留'} {s==='shipped' && '已出貨'}
                      </button>
                    ))}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar pb-32">
                    <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-50 text-[10px] font-black uppercase text-gray-400 border-b">
                                    <tr>
                                        <th className="p-4 w-12 text-center">
                                            <input type="checkbox" className="rounded" onChange={e => setSelectedIds(e.target.checked ? new Set(filteredOrders.map(o=>o.orderId)) : new Set())} checked={selectedIds.size > 0 && selectedIds.size === filteredOrders.length} />
                                        </th>
                                        <th className="p-4">單號</th>
                                        <th className="p-4">狀態</th>
                                        <th className="p-4">客戶</th>
                                        <th className="p-4">出貨日</th>
                                        <th className="p-4 text-right pr-6">詳情</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 font-medium">
                                    {filteredOrders.map(o => (
                                        <tr key={o.orderId} className={`hover:bg-orange-50/30 transition-colors cursor-pointer ${selectedIds.has(o.orderId) ? 'bg-orange-50/50' : ''}`} onClick={()=>setSelectedOrder(o)}>
                                            <td className="p-4 text-center" onClick={e=>e.stopPropagation()}>
                                                <input type="checkbox" className="rounded border-gray-300 text-orange-600 focus:ring-orange-500" checked={selectedIds.has(o.orderId)} onChange={()=>{
                                                    const n = new Set(selectedIds);
                                                    if(n.has(o.orderId)) n.delete(o.orderId); else n.add(o.orderId);
                                                    setSelectedIds(n);
                                                }} />
                                            </td>
                                            <td className="p-4">
                                                <div className="flex items-center">
                                                    <span className={`font-mono font-bold ${o.isReservation ? 'text-blue-600' : 'text-orange-600'}`}>{o.orderId}</span>
                                                    {o.isReservation && <ReservationBadge />}
                                                </div>
                                            </td>
                                            <td className="p-4"><StatusBadge status={o.status} /></td>
                                            <td className="p-4 font-bold text-gray-800">{o.company}</td>
                                            <td className="p-4 text-gray-500 font-mono text-xs">{o.deliveryDate ? o.deliveryDate.split('T')[0] : '未定'}</td>
                                            <td className="p-4 text-right pr-6">
                                                <button className="text-[10px] font-black text-gray-400 bg-gray-100 px-3 py-1.5 rounded-full uppercase">Detail</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                {selectedIds.size > 0 && (
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border border-gray-200 shadow-2xl rounded-2xl px-6 py-4 flex items-center gap-6 animate-slide-up z-40">
                        <span className="text-sm font-black text-gray-600 border-r border-gray-200 pr-6 uppercase tracking-widest whitespace-nowrap">Selected <span className="text-orange-600">{selectedIds.size}</span></span>
                        <div className="flex gap-3">
                            <button onClick={()=>handleStatusUpdate(null, '已確認庫存')} className="flex items-center gap-2 text-xs font-black text-teal-700 bg-teal-50 px-4 py-2 rounded-xl hover:bg-teal-100 transition-all"><Icons.CheckCircle size={16}/> 確認庫存</button>
                            <button onClick={()=>handleStatusUpdate(null, '已排單出貨')} className="flex items-center gap-2 text-xs font-black text-blue-700 bg-blue-50 px-4 py-2 rounded-xl hover:bg-blue-100 transition-all"><Icons.Truck size={16}/> 排單出貨</button>
                        </div>
                    </div>
                )}
              </main>

              {selectedOrder && (
                <OrderDetailModal 
                    order={selectedOrder} 
                    inventory={inventory} 
                    onClose={()=>setSelectedOrder(null)} 
                    onUpdateStatus={handleStatusUpdate} 
                    onUpdateDetails={handleUpdateDetails} 
                    onDelete={ids => handleStatusUpdate(ids, 'delete')} 
                    isProcessing={isProcessing} 
                />
              )}

              <style>{`
                .animate-fade-in { animation: fadeIn 0.2s ease-out; }
                .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
